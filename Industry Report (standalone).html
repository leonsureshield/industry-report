"64.0\" height=\"17.4\" fill=\"#e07a17\"><\u002Frect>\n<text x=\"507.0\" y=\"188.6\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"10\" font-weight=\"600\" fill=\"#0a0a0a\">300<\u002Ftext>\n<text x=\"507.0\" y=\"225.0\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"9\" fill=\"#3a3326\">60–70<\u002Ftext>\n<rect x=\"545.0\" y=\"182.2\" width=\"64.0\" height=\"27.8\" fill=\"#e07a17\"><\u002Frect>\n<text x=\"577.0\" y=\"178.2\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"10\" font-weight=\"600\" fill=\"#0a0a0a\">480<\u002Ftext>\n<text x=\"577.0\" y=\"225.0\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"9\" fill=\"#3a3326\">70–80<\u002Ftext>\n<rect x=\"615.0\" y=\"170.6\" width=\"64.0\" height=\"39.4\" fill=\"#d62524\"><\u002Frect>\n<text x=\"647.0\" y=\"166.6\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"10\" font-weight=\"600\" fill=\"#0a0a0a\">680<\u002Ftext>\n<text x=\"647.0\" y=\"225.0\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"9\" fill=\"#3a3326\">80–90<\u002Ftext>\n<rect x=\"685.0\" y=\"162.0\" width=\"64.0\" height=\"48.0\" fill=\"#d62524\"><\u002Frect>\n<text x=\"717.0\" y=\"158.0\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"10\" font-weight=\"600\" fill=\"#0a0a0a\">829<\u002Ftext>\n<text x=\"717.0\" y=\"225.0\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"9\" fill=\"#3a3326\">90–100<\u002Ftext>\n<line x1=\"599.4\" y1=\"20\" x2=\"599.4\" y2=\"210\" stroke=\"#0030d9\" stroke-width=\"2\" stroke-dasharray=\"4 3\"><\u002Fline>\n<text x=\"599.4\" y=\"15\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"10\" font-weight=\"700\" fill=\"#0030d9\">MEDIAN 78.5<\u002Ftext>\n<\u002Fsvg>\n      <div class=\"chart-note\">Distribution is heavily right weighted. The median telco (blue dotted line at 78.5) sits well into the Critical band. The bulk of the curve clusters in the 60–100 range.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ===== 06 · NINE INDICATORS ===== -->\n  <section>\n    <div class=\"section-num\"><b>06<\u002Fb> · Nine indicators<\u002Fdiv>\n    <h2>Where exposure lives. <em>Coloured by severity<\u002Fem>.<\u002Fh2>\n    <p class=\"lede\">Nine individual indicators measured across the sector. Severity grading follows the same traffic light system used throughout: red for critical (≥70%), orange for elevated (50 to 69%), yellow for caution (30 to 49%), green for acceptable (under 30%).<\u002Fp>\n\n    <div class=\"legend\">\n      <div class=\"legend-item\"><span class=\"legend-dot red\"><\u002Fspan>Critical (≥70%)<\u002Fdiv>\n      <div class=\"legend-item\"><span class=\"legend-dot orange\"><\u002Fspan>Elevated (50 to 69%)<\u002Fdiv>\n      <div class=\"legend-item\"><span class=\"legend-dot yellow\"><\u002Fspan>Caution (30 to 49%)<\u002Fdiv>\n      <div class=\"legend-item\"><span class=\"legend-dot green\"><\u002Fspan>Acceptable (under 30%)<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"tl-grid\">\n      <div class=\"tl-card orange\">\n        <div class=\"badge\">Elevated<\u002Fdiv>\n        <div class=\"label\">Elevated risk band<\u002Fdiv>\n        <div class=\"num\" style=\"color: var(--red);\">64.8%<\u002Fdiv>\n        <div class=\"body\">sit in an elevated risk band (Critical or High). The bulk of the curve.<\u002Fdiv>\n        <div class=\"count\">2,011 of 3,106 telcos<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tl-card orange\">\n        <div class=\"badge\">Elevated<\u002Fdiv>\n        <div class=\"label\">Critical band<\u002Fdiv>\n        <div class=\"num\" style=\"color: var(--red);\">56.5%<\u002Fdiv>\n        <div class=\"body\">show multiple elevated risk indicators in combination.<\u002Fdiv>\n        <div class=\"count\">1,754 telcos<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tl-card yellow\">\n        <div class=\"badge\">Caution<\u002Fdiv>\n        <div class=\"label\">Subdomain takeover risk<\u002Fdiv>\n        <div class=\"num\">40.8%<\u002Fdiv>\n        <div class=\"body\">show dangling DNS configuration. Largest single indicator by count.<\u002Fdiv>\n        <div class=\"count\">1,266 telcos<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tl-card yellow\">\n        <div class=\"badge\">Caution<\u002Fdiv>\n        <div class=\"label\">CISA KEV present<\u002Fdiv>\n        <div class=\"num\">38.5%<\u002Fdiv>\n        <div class=\"body\">carry vulnerabilities confirmed used in real world attacks.<\u002Fdiv>\n        <div class=\"count\">1,195 telcos<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tl-card yellow\">\n        <div class=\"badge\">Caution<\u002Fdiv>\n        <div class=\"label\">Elevated EPSS<\u002Fdiv>\n        <div class=\"num\">31.2%<\u002Fdiv>\n        <div class=\"body\">carry CVEs with EPSS scores indicating elevated exploitation likelihood.<\u002Fdiv>\n        <div class=\"count\">968 telcos<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tl-card yellow\">\n        <div class=\"badge\">Caution<\u002Fdiv>\n        <div class=\"label\">Weak SPF<\u002Fdiv>\n        <div class=\"num\">41.6%<\u002Fdiv>\n        <div class=\"body\">publish SPF with soft fail. Advisory rather than enforcement.<\u002Fdiv>\n        <div class=\"count\">1,293 telcos<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tl-card yellow\">\n        <div class=\"badge\">Caution<\u002Fdiv>\n        <div class=\"label\">Weak DMARC<\u002Fdiv>\n        <div class=\"num\">31.9%<\u002Fdiv>\n        <div class=\"body\">publish DMARC weakly (p=none). No instruction to reject spoofed mail.<\u002Fdiv>\n        <div class=\"count\">992 telcos<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tl-card green\">\n        <div class=\"badge\">Lower<\u002Fdiv>\n        <div class=\"label\">Both weak: DMARC + SPF<\u002Fdiv>\n        <div class=\"num\">16.0%<\u002Fdiv>\n        <div class=\"body\">carry both weaknesses on the same domain. Spoofing operationally trivial.<\u002Fdiv>\n        <div class=\"count\">496 telcos<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tl-card info\">\n        <div class=\"badge\">Reference<\u002Fdiv>\n        <div class=\"label\">Ransomware linked KEV<\u002Fdiv>\n        <div class=\"num\">12 / 25<\u002Fdiv>\n        <div class=\"body\">KEV CVEs in the sector are CISA flagged as used in ransomware campaigns.<\u002Fdiv>\n        <div class=\"count\">CISA · Ransomware<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== 07 · COMPOSITE FRAMEWORK ===== -->\n  <section>\n    <div class=\"section-num\"><b>07<\u002Fb> · The composite framework<\u002Fdiv>\n    <h2>Five indicator categories. <em>One composite<\u002Fem> framework.<\u002Fh2>\n    <p class=\"lede\">Risk indicators referenced are widely used industry concepts: CVEs catalogued by CISA as actively exploited, DMARC and SPF posture as published in DNS, the relative scale of an operator's public web presence. All inputs derive from publicly available, non intrusive sources.<\u002Fp>\n\n    <div class=\"pillar-grid\">\n      <div class=\"pillar lead\">\n        <div class=\"tag\">P1 · Weight<\u002Fdiv>\n        <div class=\"weight\">40%<\u002Fdiv>\n        <div class=\"name\">CVE Severity Score<\u002Fdiv>\n        <div class=\"desc\">KEV listed exploits, EPSS scores, legacy CVEs, CVSS composition.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pillar\">\n        <div class=\"tag\">P2 · Weight<\u002Fdiv>\n        <div class=\"weight\">20%<\u002Fdiv>\n        <div class=\"name\">Email Security<\u002Fdiv>\n        <div class=\"desc\">DMARC enforcement, SPF configuration, DKIM alignment, spoofability.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pillar\">\n        <div class=\"tag\">P3 · Weight<\u002Fdiv>\n        <div class=\"weight\">15%<\u002Fdiv>\n        <div class=\"name\">Infrastructure Risk<\u002Fdiv>\n        <div class=\"desc\">Dangling DNS, internal IP leaks, zone walking, exposed secrets.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pillar\">\n        <div class=\"tag\">P4 · Weight<\u002Fdiv>\n        <div class=\"weight\">15%<\u002Fdiv>\n        <div class=\"name\">Web Surface Risk<\u002Fdiv>\n        <div class=\"desc\">XSS, SSRF, SQLi, admin portal exposure, CMS fingerprinting.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pillar\">\n        <div class=\"tag\">P5 · Weight<\u002Fdiv>\n        <div class=\"weight\">10%<\u002Fdiv>\n        <div class=\"name\">Attack Surface<\u002Fdiv>\n        <div class=\"desc\">Open port profile and externally observable service exposure.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>How the score behaves<\u002Fh3>\n    <p>Each pillar is normalized to 0 to 100, then combined into a weighted composite. Critical signals such as KEV listed exploits, dangling DNS, exposed secrets, and public facing databases apply additional penalties on top of the pillar score. The framework is intended to surface systemic risk patterns rather than substitute for an operator level penetration test or compliance audit.<\u002Fp>\n\n    <div class=\"pullquote\">\n      The framework is durable, externally benchmarked, and derived from public industry standards. CISA KEV. EPSS. RFC 7489. None of it is proprietary.\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== 08 · SEGMENTATION DEEP DIVE ===== -->\n  <section>\n    <div class=\"section-num\"><b>08<\u002Fb> · Segmentation deep dive<\u002Fdiv>\n    <h2>The cyber risk picture is <em>uniform<\u002Fem> across provider segments.<\u002Fh2>\n    <p class=\"lede\">A natural question, \"is this our specific service category's problem?\", is answered by the segmentation data unambiguously: no. The pattern is sector wide. Every provider type, every region, every era of founding shows the same elevated baseline.<\u002Fp>\n\n    <div class=\"legend\">\n      <div class=\"legend-item\"><span class=\"legend-dot red\"><\u002Fspan>≥70%<\u002Fdiv>\n      <div class=\"legend-item\"><span class=\"legend-dot orange\"><\u002Fspan>50 to 69%<\u002Fdiv>\n      <div class=\"legend-item\"><span class=\"legend-dot yellow\"><\u002Fspan>30 to 49%<\u002Fdiv>\n      <div class=\"legend-item\"><span class=\"legend-dot green\"><\u002Fspan>under 30%<\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>By provider type<\u002Fh3>\n    <table class=\"compare\">\n      <thead>\n        <tr><th>Communications type<\u002Fth><th class=\"r\">Telcos analyzed<\u002Fth><th class=\"r\">Elevated band<\u002Fth><\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr><td class=\"label\">Interconnected VoIP<\u002Ftd><td class=\"num r\">1,020<\u002Ftd><td class=\"num r red\">71%<\u002Ftd><\u002Ftr>\n        <tr><td class=\"label\">Incumbent Local Exchange Carrier<\u002Ftd><td class=\"num r\">322<\u002Ftd><td class=\"num r red\">70%<\u002Ftd><\u002Ftr>\n        <tr><td class=\"label\">Cable TV / LEC<\u002Ftd><td class=\"num r\">43<\u002Ftd><td class=\"num r red\">70%<\u002Ftd><\u002Ftr>\n        <tr><td class=\"label\">CAP/LEC<\u002Ftd><td class=\"num r\">198<\u002Ftd><td class=\"num r orange\">66%<\u002Ftd><\u002Ftr>\n        <tr><td class=\"label\">Paging &amp; Messaging<\u002Ftd><td class=\"num r\">32<\u002Ftd><td class=\"num r orange\">66%<\u002Ftd><\u002Ftr>\n        <tr><td class=\"label\">Cellular / PCS / SMR<\u002Ftd><td class=\"num r\">71<\u002Ftd><td class=\"num r orange\">65%<\u002Ftd><\u002Ftr>\n        <tr><td class=\"label\">Local Reseller<\u002Ftd><td class=\"num r\">134<\u002Ftd><td class=\"num r orange\">65%<\u002Ftd><\u002Ftr>\n        <tr><td class=\"label\">Private Service Provider<\u002Ftd><td class=\"num r\">129<\u002Ftd><td class=\"num r orange\">64%<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <h3>WISP versus Cable. <em>Functionally indistinguishable<\u002Fem>.<\u002Fh3>\n    <p>The conventional industry narrative, that WISPs are riskier than cable operators because they are smaller, more rural and less resourced, is not supported by this analysis. The two segments sit within fractions of a percentage point on every indicator measured.<\u002Fp>\n\n    <div class=\"seg-grid\">\n      <div class=\"seg-card\">\n        <div class=\"seg-head\">\n          <div class=\"name\">WISP segment<\u002Fdiv>\n          <div class=\"pct\">70.7%<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"seg-meta\">1,988 operators · elevated risk band<\u002Fdiv>\n        <div class=\"seg-body\">\n          <div class=\"stat-line\"><span>KEV CVE present<\u002Fspan><span class=\"val yellow\">44.1%<\u002Fspan><\u002Fdiv>\n          <div class=\"stat-line\"><span>Weak DMARC<\u002Fspan><span class=\"val yellow\">36.3%<\u002Fspan><\u002Fdiv>\n          <div class=\"stat-line\"><span>Weak SPF<\u002Fspan><span class=\"val yellow\">43.9%<\u002Fspan><\u002Fdiv>\n          <div class=\"stat-line\"><span>Both weak<\u002Fspan><span class=\"val\">17.2%<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"seg-card\">\n        <div class=\"seg-head\">\n          <div class=\"name\">Cable segment<\u002Fdiv>\n          <div class=\"pct\">70.2%<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"seg-meta\">756 operators · elevated risk band<\u002Fdiv>\n        <div class=\"seg-body\">\n          <div class=\"stat-line\"><span>KEV CVE present<\u002Fspan><span class=\"val yellow\">40.9%<\u002Fspan><\u002Fdiv>\n          <div class=\"stat-line\"><span>Weak DMARC<\u002Fspan><span class=\"val yellow\">32.1%<\u002Fspan><\u002Fdiv>\n          <div class=\"stat-line\"><span>Weak SPF<\u002Fspan><span class=\"val yellow\">39.7%<\u002Fspan><\u002Fdiv>\n          <div class=\"stat-line\"><span>Both weak<\u002Fspan><span class=\"val\">15.4%<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>Modern operators are <em>not safer<\u002Fem> than legacy ones<\u002Fh3>\n    <p>The intuition that newer operators inherit modern infrastructure and therefore better security posture is not supported by the data.<\u002Fp>\n\n    <table class=\"compare\">\n      <thead>\n        <tr><th>Founding era<\u002Fth><th class=\"r\">Telcos<\u002Fth><th class=\"r\">Elevated band<\u002Fth><th class=\"r\">KEV present<\u002Fth><\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr><td class=\"label\">Pre 1960 legacy wireline<\u002Ftd><td class=\"num r\">396<\u002Ftd><td class=\"num r orange\">67%<\u002Ftd><td class=\"num r yellow\">40%<\u002Ftd><\u002Ftr>\n        <tr><td class=\"label\">1960 to 1980<\u002Ftd><td class=\"num r\">80<\u002Ftd><td class=\"num r red\">80%<\u002Ftd><td class=\"num r yellow\">44%<\u002Ftd><\u002Ftr>\n        <tr><td class=\"label\">1980 to 2000<\u002Ftd><td class=\"num r\">437<\u002Ftd><td class=\"num r orange\">62%<\u002Ftd><td class=\"num r yellow\">38%<\u002Ftd><\u002Ftr>\n        <tr><td class=\"label\">2000 to 2010 internet era<\u002Ftd><td class=\"num r\">483<\u002Ftd><td class=\"num r orange\">68%<\u002Ftd><td class=\"num r yellow\">42%<\u002Ftd><\u002Ftr>\n        <tr><td class=\"label\">2010+ modern operators<\u002Ftd><td class=\"num r\">705<\u002Ftd><td class=\"num r red\">71%<\u002Ftd><td class=\"num r yellow\">44%<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <p>Modern operators founded after 2010 are the worst performing cohort on most dimensions. Pre 1960 incumbents perform better than internet era operators. If anything, the data suggests the opposite of the intuition: older operators have been subject to decades of regulatory scrutiny and have had time to mature their practices, while modern operators built on cloud infrastructure have inherited operational complexity faster than they have inherited security discipline.<\u002Fp>\n  <\u002Fsection>\n\n\n  <!-- ===== PART 3 DIVIDER ===== -->\n  <div class=\"part-divider\">\n    <div class=\"part-num\">Part three<\u002Fdiv>\n    <h2>The <em>mechanics<\u002Fem>.<\u002Fh2>\n    <p class=\"desc\">How the dominant exposures actually work. Visual walkthroughs of subdomain takeover, email authentication, the ransomware kill chain, and the footprint pattern that drives most of the risk.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ===== 09 · DNS TAKEOVER ILLUSTRATED ===== -->\n  <section>\n    <div class=\"section-num\"><b>09<\u002Fb> · DNS takeover, illustrated<\u002Fdiv>\n    <h2>How a forgotten DNS record becomes a <em>phishing platform<\u002Fem>.<\u002Fh2>\n    <p class=\"lede\">Subdomain takeover risk is the largest single indicator in our analysis, affecting 1,266 telcos. It is also the most invisible to operators. It does not trigger conventional vulnerability scanners and does not appear in security logs unless explicitly looked for. The mechanism is simple, and the consequence is severe.<\u002Fp>\n\n    <div class=\"diagram\">\n      <div class=\"diagram-head\">CONCEPTUAL FLOW · SUBDOMAIN TAKEOVER<\u002Fdiv>\n      <div class=\"diagram-title\">Four steps. One forgotten DNS record. A phishing platform branded as the telco.<\u002Fdiv>\n<svg width=\"760\" height=\"436\" viewBox=\"0 0 800 460\" xmlns=\"http://www.w3.org/2000/svg\" style=\"font-family: Geist, sans-serif;\">\n<rect x=\"20\" y=\"20\" width=\"56\" height=\"40\" fill=\"#3a3326\"><\u002Frect>\n<text x=\"48\" y=\"47\" text-anchor=\"middle\" font-family=\"Geist, sans-serif\" font-size=\"18\" font-weight=\"800\" fill=\"#fff\">01<\u002Ftext>\n<rect x=\"20\" y=\"60\" width=\"350\" height=\"120\" fill=\"#f1ece0\" stroke=\"#c9bfa6\" stroke-width=\"1\"><\u002Frect>\n<text x=\"40\" y=\"92\" font-family=\"Geist, sans-serif\" font-size=\"15\" font-weight=\"700\" fill=\"#0a0a0a\">Telco creates a marketing site<\u002Ftext>\n<text x=\"40\" y=\"118\" font-family=\"Geist Mono, monospace\" font-size=\"11\" font-weight=\"500\" fill=\"#3a3326\">mktg.telco.com → SaaS provider<\u002Ftext>\n<rect x=\"50\" y=\"135\" width=\"50\" height=\"32\" fill=\"#3a3326\"><\u002Frect>\n<text x=\"75\" y=\"155\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"9\" font-weight=\"600\" fill=\"#fff\">DNS<\u002Ftext>\n<line x1=\"110\" y1=\"151\" x2=\"155\" y2=\"151\" stroke=\"#3a3326\" stroke-width=\"2\"><\u002Fline>\n<polygon points=\"155,151 148,146 148,156\" fill=\"#3a3326\"><\u002Fpolygon>\n<rect x=\"165\" y=\"135\" width=\"80\" height=\"32\" fill=\"#2d7a4a\"><\u002Frect>\n<text x=\"205\" y=\"155\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"9\" font-weight=\"600\" fill=\"#fff\">SaaS<\u002Ftext>\n<text x=\"270\" y=\"155\" font-family=\"Geist Mono, monospace\" font-size=\"10\" font-weight=\"700\" fill=\"#2d7a4a\">LEGITIMATE<\u002Ftext>\n<rect x=\"430\" y=\"20\" width=\"56\" height=\"40\" fill=\"#c9a227\"><\u002Frect>\n<text x=\"458\" y=\"47\" text-anchor=\"middle\" font-family=\"Geist, sans-serif\" font-size=\"18\" font-weight=\"800\" fill=\"#fff\">02<\u002Ftext>\n<rect x=\"430\" y=\"60\" width=\"350\" height=\"120\" fill=\"#f1ece0\" stroke=\"#c9bfa6\" stroke-width=\"1\"><\u002Frect>\n<text x=\"450\" y=\"92\" font-family=\"Geist, sans-serif\" font-size=\"15\" font-weight=\"700\" fill=\"#0a0a0a\">Project ends. SaaS subscription cancelled.<\u002Ftext>\n<text x=\"450\" y=\"118\" font-family=\"Geist Mono, monospace\" font-size=\"11\" font-weight=\"500\" fill=\"#3a3326\">DNS record left in place.<\u002Ftext>\n<rect x=\"460\" y=\"135\" width=\"50\" height=\"32\" fill=\"#3a3326\"><\u002Frect>\n<text x=\"485\" y=\"155\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"9\" font-weight=\"600\" fill=\"#fff\">DNS<\u002Ftext>\n<line x1=\"520\" y1=\"151\" x2=\"565\" y2=\"151\" stroke=\"#a89b7c\" stroke-width=\"2\" stroke-dasharray=\"4 3\"><\u002Fline>\n<polygon points=\"565,151 558,146 558,156\" fill=\"#a89b7c\"><\u002Fpolygon>\n<rect x=\"575\" y=\"135\" width=\"80\" height=\"32\" fill=\"#a89b7c\" stroke=\"#a89b7c\" stroke-width=\"1\" stroke-dasharray=\"2 2\"><\u002Frect>\n<text x=\"615\" y=\"155\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"9\" font-weight=\"600\" fill=\"#fff\">EMPTY<\u002Ftext>\n<text x=\"680\" y=\"155\" font-family=\"Geist Mono, monospace\" font-size=\"10\" font-weight=\"700\" fill=\"#c9a227\">DANGLING<\u002Ftext>\n<rect x=\"20\" y=\"220\" width=\"56\" height=\"40\" fill=\"#e07a17\"><\u002Frect>\n<text x=\"48\" y=\"247\" text-anchor=\"middle\" font-family=\"Geist, sans-serif\" font-size=\"18\" font-weight=\"800\" fill=\"#fff\">03<\u002Ftext>\n<rect x=\"20\" y=\"260\" width=\"350\" height=\"120\" fill=\"#f1ece0\" stroke=\"#c9bfa6\" stroke-width=\"1\"><\u002Frect>\n<text x=\"40\" y=\"292\" font-family=\"Geist, sans-serif\" font-size=\"15\" font-weight=\"700\" fill=\"#0a0a0a\">Attacker registers the abandoned SaaS account<\u002Ftext>\n<text x=\"40\" y=\"318\" font-family=\"Geist Mono, monospace\" font-size=\"11\" font-weight=\"500\" fill=\"#3a3326\">Same hostname. New owner.<\u002Ftext>\n<rect x=\"50\" y=\"335\" width=\"50\" height=\"32\" fill=\"#3a3326\"><\u002Frect>\n<text x=\"75\" y=\"355\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"9\" font-weight=\"600\" fill=\"#fff\">DNS<\u002Ftext>\n<line x1=\"110\" y1=\"351\" x2=\"155\" y2=\"351\" stroke=\"#3a3326\" stroke-width=\"2\"><\u002Fline>\n<polygon points=\"155,351 148,346 148,356\" fill=\"#3a3326\"><\u002Fpolygon>\n<rect x=\"165\" y=\"335\" width=\"80\" height=\"32\" fill=\"#d62524\"><\u002Frect>\n<text x=\"205\" y=\"355\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"9\" font-weight=\"600\" fill=\"#fff\">ATTACKER<\u002Ftext>\n<text x=\"270\" y=\"355\" font-family=\"Geist Mono, monospace\" font-size=\"10\" font-weight=\"700\" fill=\"#d62524\">HIJACKED<\u002Ftext>\n<rect x=\"430\" y=\"220\" width=\"56\" height=\"40\" fill=\"#d62524\"><\u002Frect>\n<text x=\"458\" y=\"247\" text-anchor=\"middle\" font-family=\"Geist, sans-serif\" font-size=\"18\" font-weight=\"800\" fill=\"#fff\">04<\u002Ftext>\n<rect x=\"430\" y=\"260\" width=\"350\" height=\"120\" fill=\"#f1ece0\" stroke=\"#c9bfa6\" stroke-width=\"1\"><\u002Frect>\n<text x=\"450\" y=\"292\" font-family=\"Geist, sans-serif\" font-size=\"15\" font-weight=\"700\" fill=\"#0a0a0a\">TLS certificate issued automatically<\u002Ftext>\n<text x=\"450\" y=\"318\" font-family=\"Geist Mono, monospace\" font-size=\"11\" font-weight=\"500\" fill=\"#3a3326\">mktg.telco.com now serves attacker content<\u002Ftext>\n<rect x=\"460\" y=\"335\" width=\"50\" height=\"32\" fill=\"#2d7a4a\"><\u002Frect>\n<text x=\"485\" y=\"355\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"9\" font-weight=\"600\" fill=\"#fff\">TLS CERT<\u002Ftext>\n<line x1=\"520\" y1=\"351\" x2=\"565\" y2=\"351\" stroke=\"#3a3326\" stroke-width=\"2\"><\u002Fline>\n<polygon points=\"565,351 558,346 558,356\" fill=\"#3a3326\"><\u002Fpolygon>\n<rect x=\"575\" y=\"335\" width=\"80\" height=\"32\" fill=\"#d62524\"><\u002Frect>\n<text x=\"615\" y=\"355\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"9\" font-weight=\"600\" fill=\"#fff\">PHISHING<\u002Ftext>\n<text x=\"680\" y=\"355\" font-family=\"Geist Mono, monospace\" font-size=\"10\" font-weight=\"700\" fill=\"#d62524\">LIVE<\u002Ftext>\n<line x1=\"380\" y1=\"100\" x2=\"420\" y2=\"100\" stroke=\"#d62524\" stroke-width=\"2\"><\u002Fline>\n<polygon points=\"420,100 411,95 411,105\" fill=\"#d62524\"><\u002Fpolygon>\n<path d=\"M 600 200 Q 600 210 195 215\" stroke=\"#d62524\" stroke-width=\"2\" fill=\"none\"><\u002Fpath>\n<polygon points=\"195,215 204,210 204,220\" fill=\"#d62524\"><\u002Fpolygon>\n<line x1=\"380\" y1=\"300\" x2=\"420\" y2=\"300\" stroke=\"#d62524\" stroke-width=\"2\"><\u002Fline>\n<polygon points=\"420,300 411,295 411,305\" fill=\"#d62524\"><\u002Fpolygon>\n<text x=\"400\" y=\"430\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"10\" font-weight=\"600\" fill=\"#3a3326\" letter-spacing=\"1.2\">RISK COMPOUNDS AT EACH STEP: GREY → YELLOW → ORANGE → RED<\u002Ftext>\n<\u002Fsvg>\n      <div class=\"diagram-foot\">\n        <strong>Why it matters for telcos specifically:<\u002Fstrong> internet service providers are high trust senders to their customers. Billing notices, service alerts, password resets. When a subdomain on the operator's legitimate domain serves attacker content with a valid TLS certificate, conventional phishing detection fails. The operator's brand becomes the attacker's distribution channel.\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>The scale of the problem<\u002Fh3>\n    <div class=\"bigfact\">\n      <div class=\"num\">1,266<\u002Fdiv>\n      <div class=\"statement\">\n        telcos in the analysis carry DNS records consistent with subdomain takeover risk. <em>40.8% of the sector<\u002Fem>. The most widespread single indicator measured.\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ===== 10 · DMARC ENFORCEMENT SPECTRUM ===== -->\n  <section>\n    <div class=\"section-num\"><b>10<\u002Fb> · DMARC enforcement spectrum<\u002Fdiv>\n    <h2>From <em>none<\u002Fem> to <em>reject<\u002Fem>. A spectrum of email authentication posture.<\u002Fh2>\n    <p class=\"lede\">DMARC is the email authentication standard that tells receiving mail servers what to do with messages that fail authentication checks. The policy choice is consequential. The three possible values map directly to three very different outcomes for the sender.<\u002Fp>\n\n    <div class=\"diagram\">\n      <div class=\"diagram-head\">DMARC POLICY SPECTRUM<\u002Fdiv>\n      <div class=\"diagram-title\">Three policy values. Three very different protection postures.<\u002Fdiv>\n<svg width=\"760\" height=\"342\" viewBox=\"0 0 800 360\" xmlns=\"http://www.w3.org/2000/svg\" style=\"font-family: Geist, sans-serif;\">\n<rect x=\"40\" y=\"40\" width=\"720\" height=\"14\" fill=\"none\" stroke=\"#a89b7c\" stroke-width=\"1\"><\u002Frect>\n<rect x=\"40\" y=\"40\" width=\"240\" height=\"14\" fill=\"#d62524\"><\u002Frect>\n<rect x=\"280\" y=\"40\" width=\"240\" height=\"14\" fill=\"#c9a227\"><\u002Frect>\n<rect x=\"520\" y=\"40\" width=\"240\" height=\"14\" fill=\"#2d7a4a\"><\u002Frect>\n<text x=\"40\" y=\"30\" font-family=\"Geist Mono, monospace\" font-size=\"10\" font-weight=\"700\" fill=\"#d62524\" letter-spacing=\"1.2\">NO PROTECTION<\u002Ftext>\n<text x=\"760\" y=\"30\" text-anchor=\"end\" font-family=\"Geist Mono, monospace\" font-size=\"10\" font-weight=\"700\" fill=\"#2d7a4a\" letter-spacing=\"1.2\">FULL PROTECTION<\u002Ftext>\n<line x1=\"140\" y1=\"54\" x2=\"140\" y2=\"80\" stroke=\"#d62524\" stroke-width=\"2\"><\u002Fline>\n<circle cx=\"140\" cy=\"56\" r=\"5\" fill=\"#d62524\"><\u002Fcircle>\n<rect x=\"40\" y=\"80\" width=\"200\" height=\"240\" fill=\"#f1ece0\" stroke=\"#d62524\" stroke-width=\"2\"><\u002Frect>\n<rect x=\"40\" y=\"80\" width=\"200\" height=\"44\" fill=\"#d62524\"><\u002Frect>\n<text x=\"140\" y=\"110\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"18\" font-weight=\"700\" fill=\"#fff\">p=none<\u002Ftext>\n<text x=\"58\" y=\"148\" font-family=\"Geist, sans-serif\" font-size=\"13\" font-weight=\"700\" fill=\"#0a0a0a\">Receive reports.<\u002Ftext>\n<text x=\"58\" y=\"168\" font-family=\"Geist, sans-serif\" font-size=\"12\" font-weight=\"500\" fill=\"#3a3326\">No instruction to reject.<\u002Ftext>\n<line x1=\"58\" y1=\"184\" x2=\"222\" y2=\"184\" stroke=\"#c9bfa6\" stroke-width=\"1\"><\u002Fline>\n<text x=\"58\" y=\"205\" font-family=\"Geist Mono, monospace\" font-size=\"10\" font-weight=\"600\" fill=\"#d62524\" letter-spacing=\"1.2\">STATUS<\u002Ftext>\n<text x=\"58\" y=\"222\" font-family=\"Geist, sans-serif\" font-size=\"12\" font-weight=\"600\" fill=\"#0a0a0a\">992 telcos publish this<\u002Ftext>\n<text x=\"58\" y=\"252\" font-family=\"Geist Mono, monospace\" font-size=\"10\" font-weight=\"600\" fill=\"#d62524\" letter-spacing=\"1.2\">IMPACT<\u002Ftext>\n<text x=\"58\" y=\"272\" font-family=\"Geist, sans-serif\" font-size=\"11\" font-weight=\"400\" fill=\"#0a0a0a\">Domain freely spoofable.<\u002Ftext>\n<text x=\"58\" y=\"288\" font-family=\"Geist, sans-serif\" font-size=\"11\" font-weight=\"400\" fill=\"#0a0a0a\">Phishing reaches inbox.<\u002Ftext>\n<line x1=\"400\" y1=\"54\" x2=\"400\" y2=\"80\" stroke=\"#c9a227\" stroke-width=\"2\"><\u002Fline>\n<circle cx=\"400\" cy=\"56\" r=\"5\" fill=\"#c9a227\"><\u002Fcircle>\n<rect x=\"300\" y=\"80\" width=\"200\" height=\"240\" fill=\"#f1ece0\" stroke=\"#c9a227\" stroke-width=\"2\"><\u002Frect>\n<rect x=\"300\" y=\"80\" width=\"200\" height=\"44\" fill=\"#c9a227\"><\u002Frect>\n<text x=\"400\" y=\"110\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"18\" font-weight=\"700\" fill=\"#fff\">p=quarantine<\u002Ftext>\n<text x=\"318\" y=\"148\" font-family=\"Geist, sans-serif\" font-size=\"13\" font-weight=\"700\" fill=\"#0a0a0a\">Suspect mail to spam.<\u002Ftext>\n<text x=\"318\" y=\"168\" font-family=\"Geist, sans-serif\" font-size=\"12\" font-weight=\"500\" fill=\"#3a3326\">Partial protection.<\u002Ftext>\n<line x1=\"318\" y1=\"184\" x2=\"482\" y2=\"184\" stroke=\"#c9bfa6\" stroke-width=\"1\"><\u002Fline>\n<text x=\"318\" y=\"205\" font-family=\"Geist Mono, monospace\" font-size=\"10\" font-weight=\"600\" fill=\"#c9a227\" letter-spacing=\"1.2\">STATUS<\u002Ftext>\n<text x=\"318\" y=\"222\" font-family=\"Geist, sans-serif\" font-size=\"12\" font-weight=\"600\" fill=\"#0a0a0a\">Transitional posture<\u002Ftext>\n<text x=\"318\" y=\"252\" font-family=\"Geist Mono, monospace\" font-size=\"10\" font-weight=\"600\" fill=\"#c9a227\" letter-spacing=\"1.2\">IMPACT<\u002Ftext>\n<text x=\"318\" y=\"272\" font-family=\"Geist, sans-serif\" font-size=\"11\" font-weight=\"400\" fill=\"#0a0a0a\">Some phishing still lands.<\u002Ftext>\n<text x=\"318\" y=\"288\" font-family=\"Geist, sans-serif\" font-size=\"11\" font-weight=\"400\" fill=\"#0a0a0a\">Audit period only.<\u002Ftext>\n<line x1=\"660\" y1=\"54\" x2=\"660\" y2=\"80\" stroke=\"#2d7a4a\" stroke-width=\"2\"><\u002Fline>\n<circle cx=\"660\" cy=\"56\" r=\"5\" fill=\"#2d7a4a\"><\u002Fcircle>\n<rect x=\"560\" y=\"80\" width=\"200\" height=\"240\" fill=\"#f1ece0\" stroke=\"#2d7a4a\" stroke-width=\"2\"><\u002Frect>\n<rect x=\"560\" y=\"80\" width=\"200\" height=\"44\" fill=\"#2d7a4a\"><\u002Frect>\n<text x=\"660\" y=\"110\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"18\" font-weight=\"700\" fill=\"#fff\">p=reject<\u002Ftext>\n<text x=\"578\" y=\"148\" font-family=\"Geist, sans-serif\" font-size=\"13\" font-weight=\"700\" fill=\"#0a0a0a\">Bounced at server.<\u002Ftext>\n<text x=\"578\" y=\"168\" font-family=\"Geist, sans-serif\" font-size=\"12\" font-weight=\"500\" fill=\"#3a3326\">Full enforcement.<\u002Ftext>\n<line x1=\"578\" y1=\"184\" x2=\"742\" y2=\"184\" stroke=\"#c9bfa6\" stroke-width=\"1\"><\u002Fline>\n<text x=\"578\" y=\"205\" font-family=\"Geist Mono, monospace\" font-size=\"10\" font-weight=\"600\" fill=\"#2d7a4a\" letter-spacing=\"1.2\">STATUS<\u002Ftext>\n<text x=\"578\" y=\"222\" font-family=\"Geist, sans-serif\" font-size=\"12\" font-weight=\"600\" fill=\"#0a0a0a\">Target end state<\u002Ftext>\n<text x=\"578\" y=\"252\" font-family=\"Geist Mono, monospace\" font-size=\"10\" font-weight=\"600\" fill=\"#2d7a4a\" letter-spacing=\"1.2\">IMPACT<\u002Ftext>\n<text x=\"578\" y=\"272\" font-family=\"Geist, sans-serif\" font-size=\"11\" font-weight=\"400\" fill=\"#0a0a0a\">Spoofed mail never reaches<\u002Ftext>\n<text x=\"578\" y=\"288\" font-family=\"Geist, sans-serif\" font-size=\"11\" font-weight=\"400\" fill=\"#0a0a0a\">recipient.<\u002Ftext>\n<\u002Fsvg>\n      <div class=\"diagram-foot\">\n        The DMARC and SPF standards have been industry recommended for over a decade. Their published posture is among the most measurable and most widely benchmarked dimensions of organisational cyber posture. For telcos as high trust senders to their customer base, <strong>weak DMARC enables convincing brand impersonation against subscribers<\u002Fstrong>.\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>Combined posture: SPF and DMARC together<\u002Fh3>\n    <p>The compound configuration matters more than either standard in isolation. An operator with weak SPF (soft fail) and weak DMARC (p=none) presents a domain that is operationally trivial to spoof. 16% of telcos in our analysis (496 operators) carry both weaknesses on the same domain.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ===== 11 · ANATOMY OF AN INCIDENT ===== -->\n  <section>\n    <div class=\"section-num\"><b>11<\u002Fb> · Anatomy of an incident<\u002Fdiv>\n    <h2>From initial access to <em>encrypted everything<\u002Fem>. A seven step kill chain.<\u002Fh2>\n    <p class=\"lede\">A representative ransomware incident in the US telecommunications sector follows a well documented path. The diagram below shows the typical sequence, with median time to impact at each stage based on Mandiant, Sophos and Coveware reporting. Defensive opportunities exist at every step, with the highest leverage at the first three.<\u002Fp>\n\n    <div class=\"diagram\">\n      <div class=\"diagram-head\">RANSOMWARE KILL CHAIN · MEDIAN TIME TO IMPACT<\u002Fdiv>\n      <div class=\"diagram-title\">Where the operator can intercept. And where the cost compounds.<\u002Fdiv>\n<svg width=\"760\" height=\"456\" viewBox=\"0 0 800 480\" xmlns=\"http://www.w3.org/2000/svg\" style=\"font-family: Geist, sans-serif;\">\n<line x1=\"60\" y1=\"240\" x2=\"740\" y2=\"240\" stroke=\"#0a0a0a\" stroke-width=\"3\"><\u002Fline>\n<circle cx=\"60.0\" cy=\"240\" r=\"20\" fill=\"#d62524\" stroke=\"#0a0a0a\" stroke-width=\"2\"><\u002Fcircle>\n<text x=\"60.0\" y=\"246\" text-anchor=\"middle\" font-family=\"Geist, sans-serif\" font-size=\"13\" font-weight=\"800\" fill=\"#fff\">01<\u002Ftext>\n<text x=\"60.0\" y=\"285\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"11\" font-weight=\"700\" fill=\"#0a0a0a\">T+0<\u002Ftext>\n<text x=\"60.0\" y=\"180\" text-anchor=\"middle\" font-family=\"Geist, sans-serif\" font-size=\"13\" font-weight=\"700\" fill=\"#0a0a0a\">Initial access<\u002Ftext>\n<text x=\"60.0\" y=\"196\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"10\" fill=\"#3a3326\">Exposed RDP, unpatched edge<\u002Ftext>\n<line x1=\"60.0\" y1=\"204\" x2=\"60.0\" y2=\"220\" stroke=\"#a89b7c\" stroke-width=\"1\" stroke-dasharray=\"2 2\"><\u002Fline>\n<circle cx=\"173.3\" cy=\"240\" r=\"20\" fill=\"#d62524\" stroke=\"#0a0a0a\" stroke-width=\"2\"><\u002Fcircle>\n<text x=\"173.3\" y=\"246\" text-anchor=\"middle\" font-family=\"Geist, sans-serif\" font-size=\"13\" font-weight=\"800\" fill=\"#fff\">02<\u002Ftext>\n<text x=\"173.3\" y=\"285\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"11\" font-weight=\"700\" fill=\"#0a0a0a\">T+1hr<\u002Ftext>\n<text x=\"173.3\" y=\"130\" text-anchor=\"middle\" font-family=\"Geist, sans-serif\" font-size=\"13\" font-weight=\"700\" fill=\"#0a0a0a\">Foothold<\u002Ftext>\n<text x=\"173.3\" y=\"146\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"10\" fill=\"#3a3326\">Beacon, persistence<\u002Ftext>\n<line x1=\"173.3\" y1=\"154\" x2=\"173.3\" y2=\"220\" stroke=\"#a89b7c\" stroke-width=\"1\" stroke-dasharray=\"2 2\"><\u002Fline>\n<circle cx=\"286.7\" cy=\"240\" r=\"20\" fill=\"#e07a17\" stroke=\"#0a0a0a\" stroke-width=\"2\"><\u002Fcircle>\n<text x=\"286.7\" y=\"246\" text-anchor=\"middle\" font-family=\"Geist, sans-serif\" font-size=\"13\" font-weight=\"800\" fill=\"#fff\">03<\u002Ftext>\n<text x=\"286.7\" y=\"285\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"11\" font-weight=\"700\" fill=\"#0a0a0a\">T+8hr<\u002Ftext>\n<text x=\"286.7\" y=\"180\" text-anchor=\"middle\" font-family=\"Geist, sans-serif\" font-size=\"13\" font-weight=\"700\" fill=\"#0a0a0a\">Discovery<\u002Ftext>\n<text x=\"286.7\" y=\"196\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"10\" fill=\"#3a3326\">Network mapping, AD enum<\u002Ftext>\n<line x1=\"286.7\" y1=\"204\" x2=\"286.7\" y2=\"220\" stroke=\"#a89b7c\" stroke-width=\"1\" stroke-dasharray=\"2 2\"><\u002Fline>\n<circle cx=\"400.0\" cy=\"240\" r=\"20\" fill=\"#e07a17\" stroke=\"#0a0a0a\" stroke-width=\"2\"><\u002Fcircle>\n<text x=\"400.0\" y=\"246\" text-anchor=\"middle\" font-family=\"Geist, sans-serif\" font-size=\"13\" font-weight=\"800\" fill=\"#fff\">04<\u002Ftext>\n<text x=\"400.0\" y=\"285\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"11\" font-weight=\"700\" fill=\"#0a0a0a\">T+24hr<\u002Ftext>\n<text x=\"400.0\" y=\"130\" text-anchor=\"middle\" font-family=\"Geist, sans-serif\" font-size=\"13\" font-weight=\"700\" fill=\"#0a0a0a\">Privilege escalation<\u002Ftext>\n<text x=\"400.0\" y=\"146\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"10\" fill=\"#3a3326\">Domain admin, token theft<\u002Ftext>\n<line x1=\"400.0\" y1=\"154\" x2=\"400.0\" y2=\"220\" stroke=\"#a89b7c\" stroke-width=\"1\" stroke-dasharray=\"2 2\"><\u002Fline>\n<circle cx=\"513.3\" cy=\"240\" r=\"20\" fill=\"#c9a227\" stroke=\"#0a0a0a\" stroke-width=\"2\"><\u002Fcircle>\n<text x=\"513.3\" y=\"246\" text-anchor=\"middle\" font-family=\"Geist, sans-serif\" font-size=\"13\" font-weight=\"800\" fill=\"#fff\">05<\u002Ftext>\n<text x=\"513.3\" y=\"285\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"11\" font-weight=\"700\" fill=\"#0a0a0a\">T+48hr<\u002Ftext>\n<text x=\"513.3\" y=\"180\" text-anchor=\"middle\" font-family=\"Geist, sans-serif\" font-size=\"13\" font-weight=\"700\" fill=\"#0a0a0a\">Lateral movement<\u002Ftext>\n<text x=\"513.3\" y=\"196\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"10\" fill=\"#3a3326\">PSExec, WMI, SMB<\u002Ftext>\n<line x1=\"513.3\" y1=\"204\" x2=\"513.3\" y2=\"220\" stroke=\"#a89b7c\" stroke-width=\"1\" stroke-dasharray=\"2 2\"><\u002Fline>\n<circle cx=\"626.7\" cy=\"240\" r=\"20\" fill=\"#c9a227\" stroke=\"#0a0a0a\" stroke-width=\"2\"><\u002Fcircle>\n<text x=\"626.7\" y=\"246\" text-anchor=\"middle\" font-family=\"Geist, sans-serif\" font-size=\"13\" font-weight=\"800\" fill=\"#fff\">06<\u002Ftext>\n<text x=\"626.7\" y=\"285\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"11\" font-weight=\"700\" fill=\"#0a0a0a\">T+5d<\u002Ftext>\n<text x=\"626.7\" y=\"130\" text-anchor=\"middle\" font-family=\"Geist, sans-serif\" font-size=\"13\" font-weight=\"700\" fill=\"#0a0a0a\">Exfiltration<\u002Ftext>\n<text x=\"626.7\" y=\"146\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"10\" fill=\"#3a3326\">Customer data, configs<\u002Ftext>\n<line x1=\"626.7\" y1=\"154\" x2=\"626.7\" y2=\"220\" stroke=\"#a89b7c\" stroke-width=\"1\" stroke-dasharray=\"2 2\"><\u002Fline>\n<circle cx=\"740.0\" cy=\"240\" r=\"20\" fill=\"#d62524\" stroke=\"#0a0a0a\" stroke-width=\"2\"><\u002Fcircle>\n<text x=\"740.0\" y=\"246\" text-anchor=\"middle\" font-family=\"Geist, sans-serif\" font-size=\"13\" font-weight=\"800\" fill=\"#fff\">07<\u002Ftext>\n<text x=\"740.0\" y=\"285\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"11\" font-weight=\"700\" fill=\"#0a0a0a\">T+7d<\u002Ftext>\n<text x=\"740.0\" y=\"180\" text-anchor=\"middle\" font-family=\"Geist, sans-serif\" font-size=\"13\" font-weight=\"700\" fill=\"#0a0a0a\">Encryption + ransom<\u002Ftext>\n<text x=\"740.0\" y=\"196\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"10\" fill=\"#3a3326\">All systems encrypted<\u002Ftext>\n<line x1=\"740.0\" y1=\"204\" x2=\"740.0\" y2=\"220\" stroke=\"#a89b7c\" stroke-width=\"1\" stroke-dasharray=\"2 2\"><\u002Fline>\n<text x=\"40\" y=\"330\" font-family=\"Geist Mono, monospace\" font-size=\"10\" font-weight=\"700\" fill=\"#0a0a0a\" letter-spacing=\"1.2\">DEFENSIVE LEVERAGE<\u002Ftext>\n<rect x=\"40.0\" y=\"360\" width=\"40\" height=\"60\" fill=\"#d62524\"><\u002Frect>\n<text x=\"60.0\" y=\"440\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"9\" font-weight=\"700\" fill=\"#3a3326\">HIGH<\u002Ftext>\n<rect x=\"153.3\" y=\"360\" width=\"40\" height=\"60\" fill=\"#d62524\"><\u002Frect>\n<text x=\"173.3\" y=\"440\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"9\" font-weight=\"700\" fill=\"#3a3326\">HIGH<\u002Ftext>\n<rect x=\"266.7\" y=\"385\" width=\"40\" height=\"35\" fill=\"#e07a17\"><\u002Frect>\n<text x=\"286.7\" y=\"440\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"9\" font-weight=\"700\" fill=\"#3a3326\">MED<\u002Ftext>\n<rect x=\"380.0\" y=\"385\" width=\"40\" height=\"35\" fill=\"#e07a17\"><\u002Frect>\n<text x=\"400.0\" y=\"440\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"9\" font-weight=\"700\" fill=\"#3a3326\">MED<\u002Ftext>\n<rect x=\"493.3\" y=\"405\" width=\"40\" height=\"15\" fill=\"#c9a227\"><\u002Frect>\n<text x=\"513.3\" y=\"440\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"9\" font-weight=\"700\" fill=\"#3a3326\">LOW<\u002Ftext>\n<rect x=\"606.7\" y=\"405\" width=\"40\" height=\"15\" fill=\"#c9a227\"><\u002Frect>\n<text x=\"626.7\" y=\"440\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"9\" font-weight=\"700\" fill=\"#3a3326\">LOW<\u002Ftext>\n<rect x=\"720.0\" y=\"360\" width=\"40\" height=\"60\" fill=\"#d62524\"><\u002Frect>\n<text x=\"740.0\" y=\"440\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"9\" font-weight=\"700\" fill=\"#3a3326\">HIGH<\u002Ftext>\n<text x=\"60\" y=\"465\" font-family=\"Geist Mono, monospace\" font-size=\"9\" font-weight=\"600\" fill=\"#3a3326\" letter-spacing=\"1.2\">EARLIER INTERVENTION = LOWER TOTAL COST. STAGES 01–04 ARE THE OPERATOR'S WINDOW.<\u002Ftext>\n<\u002Fsvg>\n      <div class=\"diagram-foot\">\n        The first three stages (initial access, foothold, discovery) are the operator's highest leverage window. After lateral movement begins, containment cost rises sharply. The six configuration moves in Part Five close the dominant initial access vectors at industry scale.\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== 12 · FOOTPRINT PATTERN ===== -->\n  <section>\n    <div class=\"section-num\"><b>12<\u002Fb> · The footprint pattern<\u002Fdiv>\n    <h2>Risk follows <em>operational complexity<\u002Fem>. Not company size.<\u002Fh2>\n    <p class=\"lede\">If service type doesn't predict risk and company age doesn't predict risk, what does? The strongest single predictor is the complexity of the operator's externally observable footprint.<\u002Fp>\n\n    <div class=\"pattern-grid\">\n      <div>\n        <div class=\"fp-chart\">\n          <div class=\"fp-bar b1\" style=\"height: 107px;\"><div class=\"v\">42%<\u002Fdiv><\u002Fdiv>\n          <div class=\"fp-bar b2\" style=\"height: 195px;\"><div class=\"v\">76%<\u002Fdiv><\u002Fdiv>\n          <div class=\"fp-bar b3\" style=\"height: 218px;\"><div class=\"v\">85%<\u002Fdiv><\u002Fdiv>\n          <div class=\"fp-bar b4\" style=\"height: 213px;\"><div class=\"v\">83%<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"fp-labels\">\n          <div class=\"fp-l\"><div class=\"l1\">1 to 5<\u002Fdiv><div class=\"l2\">subdomains<br>1,209 telcos<\u002Fdiv><\u002Fdiv>\n          <div class=\"fp-l\"><div class=\"l1\">6 to 15<\u002Fdiv><div class=\"l2\">subdomains<br>1,176 telcos<\u002Fdiv><\u002Fdiv>\n          <div class=\"fp-l\"><div class=\"l1\">16 to 50<\u002Fdiv><div class=\"l2\">subdomains<br>646 telcos<\u002Fdiv><\u002Fdiv>\n          <div class=\"fp-l\"><div class=\"l1\">50+<\u002Fdiv><div class=\"l2\">subdomains<br>75 telcos<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pattern-side\">\n        <div class=\"big\">2×<\u002Fdiv>\n        <div class=\"lab\">the risk between a small footprint and a moderate one.<\u002Fdiv>\n        <div class=\"foot\">Footprint discipline is the variable that matters. A larger telco with disciplined infrastructure sits in Low. A smaller telco with forgotten services sits in Critical.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>The reframing this enables<\u002Fh3>\n    <p>The implication is consequential and counter intuitive. Cyber risk in this industry is a function of how many things an operator has forgotten about, not how big the operator is. A $50M operator with disciplined infrastructure inventory can sit in the Low band. A $5M operator with eight forgotten subdomains and one unpatched portal sits in Critical. Inventory discipline, knowing what you own, decommissioning what you do not need, and maintaining what you keep, is the variable that matters.<\u002Fp>\n\n    <div class=\"pullquote\">\n      The right operator question is not \"are we investing enough in cybersecurity?\" It is: do we have a comprehensive, currently accurate inventory of our externally observable footprint, with explicit ownership per asset, and a lifecycle policy that retires DNS records when projects end?\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ===== PART 4 DIVIDER ===== -->\n  <div class=\"part-divider\">\n    <div class=\"part-num\">Part four<\u002Fdiv>\n    <h2>The <em>implications<\u002Fem>.<\u002Fh2>\n    <p class=\"desc\">What the findings mean for operators, regulators, investors and the wider critical infrastructure ecosystem. Commercial cost, regulatory exposure, and capital market consequences.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ===== 13 · COMMERCIAL IMPLICATIONS ===== -->\n  <section>\n    <div class=\"section-num\"><b>13<\u002Fb> · Commercial implications<\u002Fdiv>\n    <h2>What an incident <em>actually costs<\u002Fem> by revenue tier.<\u002Fh2>\n\n    <p class=\"lede\">For investors, lenders, acquirers and operating boards, this is the section that translates the cyber posture indicators into a financial frame. The cost of a successful incident varies materially by revenue tier. The gap between insurance carried and likely recovery cost is largest in the band where most US telcos operate.<\u002Fp>\n\n    <h3>Breach cost by revenue tier<\u002Fh3>\n    <table class=\"compare\">\n      <thead>\n        <tr><th>Revenue tier<\u002Fth><th>Typical security spend<\u002Fth><th class=\"r\">Breach cost<\u002Fth><th class=\"r\">Survivability<\u002Fth><\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr><td class=\"label\">Under $1M<\u002Ftd><td>Minimal. No dedicated staff<\u002Ftd><td class=\"num r red\">$200K to $1M+<\u002Ftd><td class=\"num r red\">Existential<\u002Ftd><\u002Ftr>\n        <tr><td class=\"label\">$1M to $10M<\u002Ftd><td>Ad hoc / shared IT role<\u002Ftd><td class=\"num r red\">$500K to $2M<\u002Ftd><td class=\"num r red\">High existential<\u002Ftd><\u002Ftr>\n        <tr><td class=\"label\">$10M to $50M<\u002Ftd><td>Part time IT manager<\u002Ftd><td class=\"num r orange\">$1M to $4M<\u002Ftd><td class=\"num r orange\">Major disruption<\u002Ftd><\u002Ftr>\n        <tr><td class=\"label\">$50M to $500M<\u002Ftd><td>Small security team<\u002Ftd><td class=\"num r yellow\">$3M to $8M<\u002Ftd><td class=\"num r yellow\">Recoverable<\u002Ftd><\u002Ftr>\n        <tr><td class=\"label\">Over $500M<\u002Ftd><td>Dedicated programme<\u002Ftd><td class=\"num r\">$8M+<\u002Ftd><td class=\"num r green\">Operational resilience<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <div class=\"scenario\">\n      <div class=\"lbl\">Epicentre cohort<\u002Fdiv>\n      <div class=\"title\">582 telcos sit in the $1M to $10M tier. Too large to be invisible. Too small to self insure.<\u002Fdiv>\n      <div class=\"body\">Operators below $1M run lean enough to be operationally simple. Operators above $10M can fund a dedicated function. This middle band is where the largest concentration of asymmetric risk lives.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>The full economic stack of a <em>single incident<\u002Fem><\u002Fh3>\n    <p>Direct recovery cost is the most visible line item but typically not the largest. The full economic stack a board should consider for any incident scenario, modelled for a representative $5M to $10M revenue operator suffering a ransomware class incident with customer data exfiltration:<\u002Fp>\n\n    <div class=\"ledger\">\n      <div class=\"ledger-head\">\n        <span>Ransomware incident, representative $5 to 10M operator<\u002Fspan>\n        <span>Low to High<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"ledger-row\">\n        <div class=\"desc\">Incident response &amp; forensics<div class=\"sub\">External IR firm, legal counsel, forensics, comms<\u002Fdiv><\u002Fdiv>\n        <div class=\"lo\">$150K<\u002Fdiv><div class=\"hi\">$400K<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ledger-row\">\n        <div class=\"desc\">System recovery &amp; rebuild<div class=\"sub\">Backup restore, asset rebuild, validation<\u002Fdiv><\u002Fdiv>\n        <div class=\"lo\">$200K<\u002Fdiv><div class=\"hi\">$600K<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ledger-row\">\n        <div class=\"desc\">Regulatory notification &amp; legal<div class=\"sub\">FCC CPNI filing, state breach notifications, counsel<\u002Fdiv><\u002Fdiv>\n        <div class=\"lo\">$75K<\u002Fdiv><div class=\"hi\">$250K<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ledger-row\">\n        <div class=\"desc\">Customer notification &amp; credit monitoring<div class=\"sub\">Mailing, monitoring services, call centre<\u002Fdiv><\u002Fdiv>\n        <div class=\"lo\">$50K<\u002Fdiv><div class=\"hi\">$200K<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ledger-row\">\n        <div class=\"desc\">Regulatory penalties (FCC + state)<div class=\"sub\">CPNI per day penalties, state law fines, settlements<\u002Fdiv><\u002Fdiv>\n        <div class=\"lo\">$100K<\u002Fdiv><div class=\"hi\">$600K<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ledger-row\">\n        <div class=\"desc\">Subscriber churn (5 to 7% over 90 days)<div class=\"sub\">Direct ARR loss. Largest line item over time.<\u002Fdiv><\u002Fdiv>\n        <div class=\"lo\">$250K<\u002Fdiv><div class=\"hi\">$1M+<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ledger-total\">\n        <div class=\"desc\">Total realistic range<\u002Fdiv>\n        <div class=\"lo\">$825K<\u002Fdiv>\n        <div class=\"hi\">$3M+<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p>The range is wide because the variables are wide. Extent of data exfiltrated, multi state regulatory exposure, brand strength in the local market, whether the operator pays the ransom, whether cyber insurance pays out. Even at the low end, the total exceeds the cost of the six configuration changes recommended in Section 16 by several orders of magnitude.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ===== 14 · REGULATORY EXPOSURE ===== -->\n  <section>\n    <div class=\"section-num\"><b>14<\u002Fb> · Regulatory exposure<\u002Fdiv>\n    <h2>Multi jurisdictional and <em>shorter fuse<\u002Fem> than most operators are configured for.<\u002Fh2>\n\n    <h3>Federal: FCC CPNI<\u002Fh3>\n    <p>Customer Proprietary Network Information (CPNI) rules apply to every operator in the FCC registry, regardless of size. Following the 2023 amendments, breach notification windows are short. FCC notification is required without unreasonable delay and no later than seven business days. Affected customers must be notified within 30 days where the breach is reasonably determined to cause harm. Penalties are real. Enforcement actions in recent years have included multi million dollar settlements with major carriers. The per day penalty structure means delay compounds rapidly.<\u002Fp>\n\n    <h3>State level: 30+ jurisdictions with overlapping obligations<\u002Fh3>\n    <p>Beyond FCC rules, state level data breach notification laws add additional and often shorter notification windows, additional penalty schedules, and additional remedies for affected residents. California's CCPA, New York's SHIELD Act, and equivalents in more than thirty US jurisdictions create a multi state matrix in which a single breach can trigger simultaneous obligations and penalties. Cumulative penalties across jurisdictions can exceed annual revenue for operators in the $1M to $10M tier.<\u002Fp>\n\n    <h3>Federal funding: BEAD and the regulatory direction of travel<\u002Fh3>\n    <p>The Broadband Equity, Access, and Deployment Program (BEAD) and other federal broadband programmes administered by NTIA and USDA carry implicit cybersecurity expectations alongside the funding. While none of these programmes mandates a specific posture today, the regulatory direction of travel is clearly toward funding eligibility being conditioned on demonstrable cyber readiness. Operators that fall materially behind the sector baseline may find themselves disqualified from future funding rounds without explicit notice.<\u002Fp>\n\n    <div class=\"why-trio\">\n      <div class=\"why-cell red\">\n        <div class=\"k\">FCC CPNI<\u002Fdiv>\n        <div class=\"v\">7 days<\u002Fdiv>\n        <div class=\"d\">Breach notification window. Per day penalties apply for delay. Applies to every FCC registry operator.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"why-cell orange\">\n        <div class=\"k\">State law<\u002Fdiv>\n        <div class=\"v\">30+<\u002Fdiv>\n        <div class=\"d\">US jurisdictions with overlapping data breach laws. Multi state operators face simultaneous proceedings.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"why-cell orange\">\n        <div class=\"k\">Subscriber churn<\u002Fdiv>\n        <div class=\"v\">5 to 7%<\u002Fdiv>\n        <div class=\"d\">Typical churn within 90 days of a publicly disclosed breach in competitive markets.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"scenario\">\n      <div class=\"lbl\">The compliance trap<\u002Fdiv>\n      <div class=\"title\">Federal regulations were written with major carriers in mind.<\u002Fdiv>\n      <div class=\"body\">Notification windows, penalty schedules and reporting requirements assume an operator has the legal and security resources to respond on the clock. For the 69% of US telcos with fewer than fifty staff, that assumption does not hold. The compliance overlay implicitly assumes operational capacity the median operator does not have.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== 15 · CAPITAL AND TRANSACTIONAL VIEW ===== -->\n  <section>\n    <div class=\"section-num\"><b>15<\u002Fb> · Capital and transactional view<\u002Fdiv>\n    <h2>For investors, lenders and acquirers: a <em>diligence reframing<\u002Fem>.<\u002Fh2>\n\n    <p class=\"lede\">For capital market participants active in US telecommunications, the findings of this report reframe several standard diligence questions. A target's reported revenue, EBITDA and subscriber count tell one story. The underlying cyber posture indicators tell another. With the elevated risk band rate sitting at 64.8% across the analysed base, the cyber exposure baseline on a randomly selected target is approximately a coin flip toward the worst risk band.<\u002Fp>\n\n    <h3>The cyber insurance market is <em>materially mispriced<\u002Fem><\u002Fh3>\n    <p>Small operator cyber insurance, particularly in the $1M to $10M tier, is by industry consensus materially mispriced relative to realistic ransomware recovery scenarios. The premium structure assumes an incident frequency and severity profile that does not match the sector's actual cyber posture indicators. For lenders and insurers, this is a diligence input that materially affects underwriting on this asset class.<\u002Fp>\n\n    <h3>Roll up consolidation is operationally <em>security debt limited<\u002Fem><\u002Fh3>\n    <p>The consolidation thesis active in regional telecommunications markets faces an underdiscussed constraint. Roll up plays in the small operator end of the industry are operationally constrained not only by integration complexity but by the security debt remediation required to bring acquired entities to a unified standard. A reasonable expectation in a 5-to-10 operator roll up is that 3-to-6 of them carry significant Critical band exposure on acquisition.<\u002Fp>\n\n    <h3>BEAD funding eligibility is becoming a <em>posture conditioned<\u002Fem> screen<\u002Fh3>\n    <p>For operators dependent on federal broadband programme funding for capital projects, the regulatory direction signals that future tranches will increasingly condition eligibility on demonstrable cyber readiness. Operators not closing the gap to the sector baseline are exposed to silent disqualification from forward funding pipelines.<\u002Fp>\n\n    <div class=\"role-grid\">\n      <div class=\"role-card\">\n        <div class=\"role-tag\">For the<\u002Fdiv>\n        <div class=\"role-name\">Acquirer<\u002Fdiv>\n        <div class=\"role-action\">Cyber posture is now a <em>top three<\u002Fem> diligence dimension.<\u002Fdiv>\n        <div class=\"role-body\">Alongside subscriber economics and regulatory standing. Public indicators per Section 06 can be assembled per target in days, not weeks, and they are durable signals.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"role-card\">\n        <div class=\"role-tag\">For the<\u002Fdiv>\n        <div class=\"role-name\">Lender<\u002Fdiv>\n        <div class=\"role-action\">Reset <em>underwriting<\u002Fem> for the small operator class.<\u002Fdiv>\n        <div class=\"role-body\">The $1M to $10M revenue tier carries cyber tail risk materially above what current credit pricing reflects. Quantitative recalibration is overdue.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"role-card\">\n        <div class=\"role-tag\">For the<\u002Fdiv>\n        <div class=\"role-name\">Insurer<\u002Fdiv>\n        <div class=\"role-action\">Premiums need to <em>reflect<\u002Fem> sector posture.<\u002Fdiv>\n        <div class=\"role-body\">Current pricing assumes posture significantly better than the data shows. Re underwriting against publicly observable indicators is straightforward.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"role-card\">\n        <div class=\"role-tag\">For the<\u002Fdiv>\n        <div class=\"role-name\">Federal programmes<\u002Fdiv>\n        <div class=\"role-action\">Conditioning eligibility on <em>posture baseline<\u002Fem>.<\u002Fdiv>\n        <div class=\"role-body\">Operators below a defined posture threshold could be flagged in BEAD review cycles. The framework in Section 07 provides the metric structure.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ===== PART 5 DIVIDER ===== -->\n  <div class=\"part-divider\">\n    <div class=\"part-num\">Part five<\u002Fdiv>\n    <h2>The <em>path forward<\u002Fem>.<\u002Fh2>\n    <p class=\"desc\">What closes the gap. Six configuration changes, a ninety day implementation calendar with explicit ownership, and a methodology note that documents how the analysis was constructed.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ===== 16 · SIX CONFIGURATION MOVES ===== -->\n  <section>\n    <div class=\"section-num\"><b>16<\u002Fb> · Six configuration moves<\u002Fdiv>\n    <h2>Six changes <em>close most of the gap<\u002Fem>.<\u002Fh2>\n    <p class=\"lede\">No new tooling. No new headcount. No new capital. Three in the first 30 days, three in the next 60. Each detailed enough for an internal technical owner to action without further specification.<\u002Fp>\n\n    <div class=\"moves-grid\">\n      <div class=\"moves-col\">\n        <div class=\"moves-head\"><span class=\"horizon\">0 to 30 days<\u002Fspan> · IMMEDIATE<\u002Fdiv>\n\n        <div class=\"move-item\">\n          <div class=\"move-num\">01<\u002Fdiv>\n          <div>\n            <div class=\"move-title\">DMARC to p=reject<\u002Fdiv>\n            <div class=\"move-body\">Move every sending domain from p=none to p=reject. Closes spoofability for 992 telcos. Run report only for two weeks first to identify legitimate sending sources.<\u002Fdiv>\n            <div class=\"move-effort\">Single DNS record per domain<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"move-item\">\n          <div class=\"move-num\">02<\u002Fdiv>\n          <div>\n            <div class=\"move-title\">Restrict remote access services<\u002Fdiv>\n            <div class=\"move-body\">Limit administrative access to operator controlled IP ranges and identity managed VPN sessions only. Closes the primary ransomware initial access vector per Verizon DBIR.<\u002Fdiv>\n            <div class=\"move-effort\">Firewall configuration<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"move-item\">\n          <div class=\"move-num\">03<\u002Fdiv>\n          <div>\n            <div class=\"move-title\">Patch the CISA KEV catalogue<\u002Fdiv>\n            <div class=\"move-body\">Prioritise ProxyLogon, BlueKeep, recent SharePoint chains and PHP CGI entries. All present across the sector at scale.<\u002Fdiv>\n            <div class=\"move-effort\">Standard patching cycle<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"moves-col cold\">\n        <div class=\"moves-head\"><span class=\"horizon\">30 to 90 days<\u002Fspan> · SHORT TERM<\u002Fdiv>\n\n        <div class=\"move-item\">\n          <div class=\"move-num\">04<\u002Fdiv>\n          <div>\n            <div class=\"move-title\">Audit DNS for dangling records<\u002Fdiv>\n            <div class=\"move-body\">Highest impact action available. Affects 1,266 telcos at industry level. Run a comprehensive DNS audit, identify records pointing to abandoned third party resources, remove or reclaim. Adopt a DNS lifecycle policy.<\u002Fdiv>\n            <div class=\"move-effort\">DNS audit + cleanup<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"move-item\">\n          <div class=\"move-num\">05<\u002Fdiv>\n          <div>\n            <div class=\"move-title\">Disable cleartext mail and file transfer<\u002Fdiv>\n            <div class=\"move-body\">Force encrypted equivalents (IMAPS, POP3S, SMTPS, SFTP) on every access path. Cleartext credential protocols persist in the sector at higher rates than any modernised industry should accept.<\u002Fdiv>\n            <div class=\"move-effort\">Mail server reconfiguration<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"move-item\">\n          <div class=\"move-num\">06<\u002Fdiv>\n          <div>\n            <div class=\"move-title\">Update widely used client libraries<\u002Fdiv>\n            <div class=\"move-body\">Update jQuery to 3.6+, Bootstrap to current LTS, and similar widely used frontend libraries across customer facing properties. Removes a clustered set of frontend CVEs.<\u002Fdiv>\n            <div class=\"move-effort\">Library upgrade<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"margin-top: 1.5rem;\">None of the six moves above require new tooling, new headcount, or capital expenditure. All are configuration changes against existing infrastructure. For the median operator, the full programme is a four to six engineer week effort, funded from existing IT envelope.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ===== 17 · IMPLEMENTATION CALENDAR ===== -->\n  <section>\n    <div class=\"section-num\"><b>17<\u002Fb> · Implementation calendar<\u002Fdiv>\n    <h2>Who owns what, and when. A <em>practical roadmap<\u002Fem>.<\u002Fh2>\n    <p class=\"lede\">The recommendations in Section 16 are configuration changes, not strategic initiatives. They benefit from explicit calendar ownership and reporting cadence to convert into completed work.<\u002Fp>\n\n    <div class=\"calendar\">\n      <div class=\"cal-row header\">\n        <div>Horizon<\u002Fdiv>\n        <div>Action<\u002Fdiv>\n        <div>Owner / cadence<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cal-row\">\n        <div class=\"when\">Week 1<span class=\"sub\">Days 1 to 7<\u002Fspan><\u002Fdiv>\n        <div class=\"what\">Form the cyber readiness working group\n          <span class=\"desc\">CISO / IT lead, head of network ops, general counsel, COO. Single point of accountability to the CEO. First weekly readout scheduled.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"owner\"><b>CEO sponsors<\u002Fb>CISO / IT lead chairs<br>Weekly readout to CEO<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cal-row\">\n        <div class=\"when\">Weeks 1 to 2<span class=\"sub\">Days 1 to 14<\u002Fspan><\u002Fdiv>\n        <div class=\"what\">DMARC report only deployment\n          <span class=\"desc\">Publish DMARC with p=none and rua reporting. Two weeks of telemetry to identify legitimate sending sources before moving to enforcement.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"owner\"><b>Network / IT<\u002Fb>DNS record change<br>Telemetry review by week 3<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cal-row\">\n        <div class=\"when\">Weeks 2 to 3<span class=\"sub\">Days 8 to 21<\u002Fspan><\u002Fdiv>\n        <div class=\"what\">Restrict remote access to allowlisted IP ranges\n          <span class=\"desc\">Firewall changes. Validate operator's own admin connectivity before enforcement. Document IR procedure if locked out.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"owner\"><b>Network ops<\u002Fb>Firewall configuration<br>Validate with security team<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cal-row\">\n        <div class=\"when\">Weeks 2 to 4<span class=\"sub\">Days 8 to 30<\u002Fspan><\u002Fdiv>\n        <div class=\"what\">CISA KEV remediation sprint\n          <span class=\"desc\">Inventory KEV CVEs on public facing systems. Patch in priority order. Ransomware linked first.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"owner\"><b>IT / patching team<\u002Fb>Standard patching cycle<br>Weekly progress report<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cal-row\">\n        <div class=\"when\">Week 4<span class=\"sub\">Day 28 to 30<\u002Fspan><\u002Fdiv>\n        <div class=\"what\">30 day board readout\n          <span class=\"desc\">Quick win programme completion status. Reset for the 90 day workstream. Decision on commissioning ongoing posture monitoring.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"owner\"><b>CISO / IT lead<\u002Fb>To full board<br>One page summary<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cal-row\">\n        <div class=\"when\">Weeks 5 to 8<span class=\"sub\">Days 30 to 60<\u002Fspan><\u002Fdiv>\n        <div class=\"what\">DNS audit and dangling record cleanup\n          <span class=\"desc\">Comprehensive enumeration of operator's externally observable DNS footprint. Identify and remove records pointing to abandoned third party resources. Establish ongoing lifecycle policy.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"owner\"><b>Network ops + DevOps<\u002Fb>DNS audit tool + manual review<br>Asset inventory output<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cal-row\">\n        <div class=\"when\">Weeks 5 to 10<span class=\"sub\">Days 30 to 70<\u002Fspan><\u002Fdiv>\n        <div class=\"what\">Cleartext protocol decommission &amp; client library upgrades\n          <span class=\"desc\">Disable cleartext mail and file transfer protocols. Coordinate client library updates across customer facing properties.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"owner\"><b>Mail / web teams<\u002Fb>Reconfiguration + library upgrade<br>Customer comms required<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cal-row\">\n        <div class=\"when\">Week 12<span class=\"sub\">Day 84 to 90<\u002Fspan><\u002Fdiv>\n        <div class=\"what\">90 day board readout &amp; ongoing posture monitoring decision\n          <span class=\"desc\">Full programme completion status, measured against the indicator categories in Section 06. Decision on ongoing quarterly posture monitoring against the same metrics.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"owner\"><b>CISO / IT lead<\u002Fb>To full board<br>Plus quarterly cadence proposal<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== 18 · METHODOLOGY, SOURCES, NOTICES ===== -->\n  <section>\n    <div class=\"section-num\"><b>18<\u002Fb> · Methodology, sources, notices<\u002Fdiv>\n    <h2>How this report was <em>constructed<\u002Fem>.<\u002Fh2>\n\n    <h3>Population scope<\u002Fh3>\n    <p>The analysis universe is 7,000+ US telecommunications operators drawn from the FCC public registry. Of those, 3,106 had sufficient publicly available data for full composite indicator scoring. 2,132 also had matched entity profile data for the cross sectional analyses (founding year, revenue tier, headcount). Where percentages are reported, the denominator is stated explicitly.<\u002Fp>\n\n    <h3>Data sources<\u002Fh3>\n    <div class=\"sources-grid\">\n      <div class=\"source\"><div class=\"n\">FCC Public Registry<\u002Fdiv><div class=\"d\">Provider classifications, FRN linkage, geographic data<\u002Fdiv><\u002Fdiv>\n      <div class=\"source\"><div class=\"n\">CISA KEV Catalogue<\u002Fdiv><div class=\"d\">Known Exploited Vulnerabilities, ransomware flags<\u002Fdiv><\u002Fdiv>\n      <div class=\"source\"><div class=\"n\">NIST &amp; EPSS<\u002Fdiv><div class=\"d\">CVE base scores and exploit prediction scores<\u002Fdiv><\u002Fdiv>\n      <div class=\"source\"><div class=\"n\">Verizon DBIR · IBM CODB<\u002Fdiv><div class=\"d\">Industry context, incident frequency, breach cost benchmarks<\u002Fdiv><\u002Fdiv>\n      <div class=\"source\"><div class=\"n\">Public DNS &amp; advisories<\u002Fdiv><div class=\"d\">DMARC, SPF posture from public DNS queries<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>Indicator construction<\u002Fh3>\n    <p>Each indicator is constructed from publicly available, non intrusive sources. CVE associations are derived from CISA's published KEV catalogue and NIST NVD. DMARC and SPF posture is read from public DNS records. DNS dangling configuration is identified by published canonical name records pointing to third party hosted resources whose ownership status is identifiable from public sources. No authenticated access, no proxy testing, no port enumeration beyond what publicly available sources provide.<\u002Fp>\n\n    <h3>Score construction<\u002Fh3>\n    <p>The composite score is a weighted combination of five pillars detailed in Section 07. The weighting reflects industry consensus on the relative importance of each indicator category, calibrated against the published frameworks of CISA, NIST and the Center for Internet Security. Threshold definitions for the Critical, High, Medium, Low and Minimal bands are documented in the technical appendix available on request.<\u002Fp>\n\n    <h3>Replication and review<\u002Fh3>\n    <p>All indicator definitions and composite scoring methodology are publicly documented. Independent replication using the same source data should produce results within ±2% on aggregate indicators. We welcome external review and have made the methodology technical note available to qualifying reviewers on request.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ===== CTA ===== -->\n  <div class=\"cta\">\n    <div class=\"eyebrow\">Take action<\u002Fdiv>\n    <h2>The exposure is real. The fixes are <em>cheap<\u002Fem>. Inaction is what's <em>costly<\u002Fem>.<\u002Fh2>\n    <p>For a $1M to $10M telco, a single ransomware incident lands at $825K to $3M+ in total cost. The six configuration changes in Section 16 cost four to six engineer weeks. Most of the gap closes with decisions, not procurement.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ===== DISCLAIMERS ===== -->\n  <section class=\"disclaimer-section\" style=\"border-bottom: none;\">\n    <div class=\"eyebrow\">Notices to acknowledge<\u002Fdiv>\n    <h2 style=\"font-size: 1.5rem; max-width: 720px;\">This report is provided for general informational and educational purposes only.<\u002Fh2>\n\n    <div class=\"disclaimer-list\">\n      <div class=\"disc\">\n        <div class=\"n\">01<\u002Fdiv>\n        <div class=\"b\"><strong>Public information only.<\u002Fstrong> All findings are derived exclusively from openly published, non intrusive sources. No authenticated scans were attempted. No access controls circumvented. No proprietary data accessed.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"disc\">\n        <div class=\"n\">02<\u002Fdiv>\n        <div class=\"b\"><strong>Industry level. No individual provider named.<\u002Fstrong> No specific operator is named, characterised, evaluated or assessed. Aggregate counts convey sector patterns, not provider level conclusions.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"disc\">\n        <div class=\"n\">03<\u002Fdiv>\n        <div class=\"b\"><strong>Not a vulnerability assessment or audit.<\u002Fstrong> Findings are directional indicators of systemic risk. Not penetration tests, compliance evaluations, or definitive measures of any provider's posture.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"disc\">\n        <div class=\"n\">04<\u002Fdiv>\n        <div class=\"b\"><strong>No enforcement implication.<\u002Fstrong> Nothing here constitutes an allegation of non compliance, negligence or misconduct, or a basis for regulatory, funding or eligibility determinations including under FCC rules or the BEAD Program.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"disc\">\n        <div class=\"n\">05<\u002Fdiv>\n        <div class=\"b\"><strong>No advice. Provided \"as is\".<\u002Fstrong> This is not legal, financial, regulatory, technical or operational advice. The authors disclaim any liability for use of, or reliance on, this material, to the maximum extent permitted by law.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FOOTER ===== -->\n  <footer class=\"footer\">\n    <div class=\"brand-row\">\n      <img src

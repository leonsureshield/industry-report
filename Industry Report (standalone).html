document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 body {\n    background: var(--ink);\n    color: var(--text);\n    font-family: var(--sans);\n    font-size: 16px;\n    line-height: 1.55;\n  }\n  .page { max-width: 880px; margin: 0 auto; background: var(--ink); }\n\n  section, .cta, .quote-section, .findings-grid, .pillar-grid,\n  .moves-grid, .why-trio, .hero-stats, .sources-grid,\n  .disclaimer-list, .disc, .scenario, .seg-card, .deep-stat, .impl-row,\n  .ledger, .calendar, .cal-row, .compare, .pattern-grid, .role-card,\n  .bigfact, .tl-grid, .chart-block, .diagram, .map-block,\n  .state-bars, .era-chart, .part-divider {\n    page-break-inside: avoid;\n    break-inside: avoid;\n  }\n\n  /* ============================ MASTHEAD ============================ */\n  .masthead {\n    padding: 1.5rem 3rem;\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    border-bottom: 1px solid rgba(10, 18, 32, 0.12);\n    background: var(--ink);\n  }\n  .masthead .logo-sureshield { height: 44px; width: auto; }\n  .masthead .logo-borderhawk { height: 40px; width: auto; }\n\n  /* ============================ COVER ============================ */\n  .cover {\n    padding: 6rem 3rem 4.5rem;\n    border-bottom: 1px solid var(--wire);\n    position: relative;\n  }\n  .cover-eyebrow {\n    font-family: var(--mono);\n    font-size: 12px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--red);\n    font-weight: 700;\n    margin-bottom: 2.5rem;\n    display: flex;\n    align-items: center;\n    gap: 0.75rem;\n  }\n  .cover-eyebrow::before {\n    content: \"\";\n    width: 3rem;\n    height: 2px;\n    background: var(--red);\n  }\n  h1.cover-title {\n    font-family: var(--display);\n    font-weight: 800;\n    font-size: 4.5rem;\n    line-height: 0.96;\n    letter-spacing: -0.04em;\n    color: var(--text);\n    text-wrap: balance;\n    margin-bottom: 2rem;\n  }\n  h1.cover-title em {\n    font-family: var(--display);\n    font-style: italic;\n    font-weight: 800;\n    color: var(--red);\n    letter-spacing: -0.025em;\n  }\n  .cover-sub {\n    font-family: var(--serif);\n    font-style: italic;\n    font-size: 1.5rem;\n    line-height: 1.35;\n    color: var(--text);\n    max-width: 640px;\n    margin-bottom: 3rem;\n    opacity: 0.85;\n  }\n  .cover-meta {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 0;\n    border-top: 1px solid var(--wire);\n    padding-top: 1.5rem;\n  }\n  .cover-meta-item .k {\n    font-family: var(--mono);\n    font-size: 10px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--static);\n    margin-bottom: 0.5rem;\n  }\n  .cover-meta-item .v {\n    font-family: var(--display);\n    font-weight: 700;\n    font-size: 1rem;\n    color: var(--text);\n    letter-spacing: -0.01em;\n  }\n  .cover-stamp {\n    position: absolute;\n    top: 6rem;\n    right: 3rem;\n    width: 130px;\n    height: 130px;\n    border-radius: 50%;\n    background: var(--red);\n    color: var(--ink);\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: center;\n    font-family: var(--display);\n    font-weight: 800;\n    text-align: center;\n    transform: rotate(-8deg);\n  }\n  .cover-stamp .big {\n    font-size: 1.875rem;\n    line-height: 1;\n    letter-spacing: -0.025em;\n  }\n  .cover-stamp .lbl {\n    font-family: var(--mono);\n    font-size: 9px;\n    letter-spacing: 0.15em;\n    text-transform: uppercase;\n    margin-top: 0.4rem;\n    font-weight: 500;\n  }\n\n  /* ============================ PART DIVIDER ============================ */\n  .part-divider {\n    background: var(--text);\n    color: var(--ink);\n    padding: 4rem 3rem;\n    border-bottom: 1px solid var(--text);\n  }\n  .part-divider .part-num {\n    font-family: var(--mono);\n    font-size: 11px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--red);\n    font-weight: 700;\n    margin-bottom: 1.25rem;\n    display: flex;\n    align-items: center;\n    gap: 0.75rem;\n  }\n  .part-divider .part-num::before {\n    content: \"\";\n    width: 3rem;\n    height: 2px;\n    background: var(--red);\n  }\n  .part-divider h2 {\n    font-family: var(--display);\n    font-weight: 800;\n    font-size: 3rem;\n    line-height: 1.0;\n    letter-spacing: -0.035em;\n    color: var(--ink);\n    margin-bottom: 1rem;\n  }\n  .part-divider h2 em {\n    font-family: var(--display);\n    font-style: italic;\n    font-weight: 800;\n    color: var(--red);\n    letter-spacing: -0.025em;\n  }\n  .part-divider .desc {\n    font-family: var(--serif);\n    font-style: italic;\n    font-size: 1.125rem;\n    line-height: 1.5;\n    color: var(--ink);\n    opacity: 0.7;\n    max-width: 620px;\n  }\n\n  /* ============================ SECTIONS ============================ */\n  section {\n    padding: 4.5rem 3rem;\n    border-bottom: 1px solid var(--wire);\n  }\n  .eyebrow {\n    font-family: var(--mono);\n    font-size: 11px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--red);\n    font-weight: 600;\n    margin-bottom: 1.25rem;\n    display: flex;\n    align-items: center;\n    gap: 0.75rem;\n  }\n  .eyebrow::before {\n    content: \"\";\n    width: 2rem;\n    height: 2px;\n    background: var(--red);\n  }\n  .eyebrow.muted { color: var(--static); }\n  .eyebrow.muted::before { background: var(--static); }\n  .section-num {\n    font-family: var(--mono);\n    font-size: 11px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--static);\n    margin-bottom: 1rem;\n  }\n  .section-num b { color: var(--red); font-weight: 700; }\n  h2 {\n    font-family: var(--display);\n    font-weight: 800;\n    font-size: 2.5rem;\n    line-height: 1.05;\n    letter-spacing: -0.03em;\n    text-wrap: balance;\n    margin-bottom: 1.5rem;\n    color: var(--text);\n  }\n  h2 em {\n    font-family: var(--display);\n    font-style: italic;\n    font-weight: 800;\n    color: var(--red);\n    letter-spacing: -0.025em;\n  }\n  h3 {\n    font-family: var(--display);\n    font-weight: 700;\n    font-size: 1.25rem;\n    line-height: 1.3;\n    letter-spacing: -0.015em;\n    color: var(--text);\n    margin: 2.5rem 0 1rem;\n  }\n  h3:first-child { margin-top: 0; }\n  h3 em {\n    font-family: var(--display);\n    font-style: italic;\n    font-weight: 700;\n    color: var(--red);\n  }\n  .lede {\n    font-size: 1.0625rem;\n    line-height: 1.6;\n    color: var(--text);\n    max-width: 740px;\n    opacity: 0.88;\n    margin-bottom: 1.5rem;\n  }\n  p {\n    font-size: 0.9375rem;\n    line-height: 1.65;\n    color: var(--text);\n    margin-bottom: 1rem;\n    max-width: 740px;\n  }\n  p:last-child { margin-bottom: 0; }\n  p strong { font-weight: 700; }\n\n  .pullquote {\n    border-left: 4px solid var(--red);\n    padding: 0.75rem 0 0.75rem 1.5rem;\n    margin: 1.5rem 0;\n    font-family: var(--serif);\n    font-style: italic;\n    font-size: 1.375rem;\n    line-height: 1.35;\n    color: var(--text);\n    max-width: 720px;\n  }\n  .pullquote .attr {\n    display: block;\n    margin-top: 0.75rem;\n    font-family: var(--mono);\n    font-style: normal;\n    font-size: 10px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--static);\n    font-weight: 600;\n  }\n\n  /* ============================ CHART BLOCK ============================ */\n  .chart-block {\n    margin: 2rem 0;\n    background: var(--ink2);\n    padding: 2rem;\n    border: 1px solid var(--wire);\n  }\n  .chart-block .chart-head {\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n    padding-bottom: 0.75rem;\n    border-bottom: 1px solid var(--wire);\n    margin-bottom: 1.5rem;\n  }\n  .chart-block .chart-title {\n    font-family: var(--display);\n    font-weight: 700;\n    font-size: 1.0625rem;\n    color: var(--text);\n    letter-spacing: -0.01em;\n  }\n  .chart-block .chart-source {\n    font-family: var(--mono);\n    font-size: 10px;\n    letter-spacing: 0. wire);\"><span style=\"font-family: var(--mono); color: var(--red); font-weight: 700;\">10<\u002Fspan><span>DMARC enforcement spectrum<\u002Fspan><span style=\"font-family: var(--mono); color: var(--static); text-align: right; font-size: 0.75rem;\">22<\u002Fspan><\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 30px 1fr 30px; gap: 0.5rem; padding: 0.4rem 0; font-size: 0.875rem; border-bottom: 1px dashed var(--wire);\"><span style=\"font-family: var(--mono); color: var(--red); font-weight: 700;\">14<\u002Fspan><span>Regulatory exposure<\u002Fspan><span style=\"font-family: var(--mono); color: var(--static); text-align: right; font-size: 0.75rem;\">28<\u002Fspan><\u002Fdiv>\n\n      <div style=\"display: grid; grid-template-columns: 30px 1fr 30px; gap: 0.5rem; padding: 0.4rem 0; font-size: 0.875rem; border-bottom: 1px dashed var(--wire);\"><span style=\"font-family: var(--mono); color: var(--red); font-weight: 700;\">11<\u002Fspan><span>Anatomy of an incident<\u002Fspan><span style=\"font-family: var(--mono); color: var(--static); text-align: right; font-size: 0.75rem;\">23<\u002Fspan><\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 30px 1fr 30px; gap: 0.5rem; padding: 0.4rem 0; font-size: 0.875rem; border-bottom: 1px dashed var(--wire);\"><span style=\"font-family: var(--mono); color: var(--red); font-weight: 700;\">15<\u002Fspan><span>Capital and transactional view<\u002Fspan><span style=\"font-family: var(--mono); color: var(--static); text-align: right; font-size: 0.75rem;\">29<\u002Fspan><\u002Fdiv>\n\n      <div style=\"display: grid; grid-template-columns: 30px 1fr 30px; gap: 0.5rem; padding: 0.4rem 0; font-size: 0.875rem; border-bottom: 1px dashed var(--wire);\"><span style=\"font-family: var(--mono); color: var(--red); font-weight: 700;\">12<\u002Fspan><span>The footprint pattern<\u002Fspan><span style=\"font-family: var(--mono); color: var(--static); text-align: right; font-size: 0.75rem;\">25<\u002Fspan><\u002Fdiv>\n      <div style=\"font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; color: var(--static); padding-bottom: 0.4rem; border-bottom: 1px dashed var(--wire); display: grid; grid-template-columns: 30px 1fr 30px; gap: 0.5rem; margin-top: 1rem;\"><span style=\"color: var(--red); font-weight: 700;\">P5<\u002Fspan><span style=\"font-family: var(--display); font-weight: 700; text-transform: none; color: var(--text); letter-spacing: -0.01em;\">The path forward<\u002Fspan><span><\u002Fspan><\u002Fdiv>\n\n      <div><\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 30px 1fr 30px; gap: 0.5rem; padding: 0.4rem 0; font-size: 0.875rem; border-bottom: 1px dashed var(--wire);\"><span style=\"font-family: var(--mono); color: var(--red); font-weight: 700;\">16<\u002Fspan><span>Six configuration moves<\u002Fspan><span style=\"font-family: var(--mono); color: var(--static); text-align: right; font-size: 0.75rem;\">31<\u002Fspan><\u002Fdiv>\n\n      <div><\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 30px 1fr 30px; gap: 0.5rem; padding: 0.4rem 0; font-size: 0.875rem; border-bottom: 1px dashed var(--wire);\"><span style=\"font-family: var(--mono); color: var(--red); font-weight: 700;\">17<\u002Fspan><span>Implementation calendar<\u002Fspan><span style=\"font-family: var(--mono); color: var(--static); text-align: right; font-size: 0.75rem;\">33<\u002Fspan><\u002Fdiv>\n\n      <div><\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 30px 1fr 30px; gap: 0.5rem; padding: 0.4rem 0; font-size: 0.875rem; border-bottom: 1px dashed var(--wire);\"><span style=\"font-family: var(--mono); color: var(--red); font-weight: 700;\">18<\u002Fspan><span>Methodology, sources, notices<\u002Fspan><span style=\"font-family: var(--mono); color: var(--static); text-align: right; font-size: 0.75rem;\">35<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ===== PART 1 DIVIDER ===== -->\n  <div class=\"part-divider\">\n    <div class=\"part-num\">Part one<\u002Fdiv>\n    <h2>The <em>picture<\u002Fem>.<\u002Fh2>\n    <p class=\"desc\">Where the US telecommunications sector sits today. Structure, scale, threat baseline, and the geographic distribution of the operator population.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ===== 01 · EXECUTIVE SUMMARY ===== -->\n  <section>\n    <div class=\"section-num\"><b>01<\u002Fb> · Executive summary<\u002Fdiv>\n    <h2>What this report finds, <em>at a glance<\u002Fem>.<\u002Fh2>\n\n    <div class=\"takeaways\">\n      <div class=\"takeaway\"><div class=\"n\">01<\u002Fdiv><div class=\"h\">Elevated risk is the median condition of US telco, not the tail.<\u002Fdiv><\u002Fdiv>\n      <div class=\"takeaway\"><div class=\"n\">02<\u002Fdiv><div class=\"h\">Top exposures are well known and cheap to remediate.<\u002Fdiv><\u002Fdiv>\n      <div class=\"takeaway\"><div class=\"n\">03<\u002Fdiv><div class=\"h\">Operational complexity drives risk. Company size does not.<\u002Fdiv><\u002Fdiv>\n      <div class=\"takeaway\"><div class=\"n\">04<\u002Fdiv><div class=\"h\">No service segment falls below 64% in the elevated band.<\u002Fdiv><\u002Fdiv>\n      <div class=\"takeaway\"><div class=\"n\">05<\u002Fdiv><div class=\"h\">Cost of inaction is asymmetric. A single incident exceeds full remediation cost.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>The headline finding in one figure<\u002Fh3>\n    <div class=\"bigfact\">\n      <div class=\"num\">64.8%<\u002Fdiv>\n      <div class=\"statement\">\n        of the 3,106 telcos analyzed sit in an <em>elevated risk band<\u002Fem>. This is the bulk of the curve, not a tail of laggards.\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"margin-top: 1.5rem;\">Across publicly observable indicators including known exploited vulnerabilities, email authentication posture, and DNS hygiene, almost two of every three US telecommunications operators present indicators consistent with elevated cyber exposure. The mean composite indicator score is 65.7 out of 100. The median is 78.5. The 75th percentile is 90.0.<\u002Fp>\n\n    <p>This is not a tail of laggards. It is the bulk of the curve. The structural finding is that the US telecommunications sector, by entity count, is overwhelmingly composed of small private operators with limited dedicated security capacity. The cyber risk picture follows from that structural reality.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ===== 02 · WHY NOW ===== -->\n  <section>\n    <div class=\"section-num\"><b>02<\u002Fb> · Why this report now<\u002Fdiv>\n    <h2>Telecommunications is <em>critical national infrastructure<\u002Fem>. The threat baseline has shifted.<\u002Fh2>\n\n    <p class=\"lede\">Emergency services, finance, healthcare, energy and public safety all depend on telecommunications. Its cybersecurity posture is a public interest condition before it is a commercial one. Three reference points frame the urgency of this report.<\u002Fp>\n\n    <div class=\"why-trio\">\n      <div class=\"why-cell red\">\n        <div class=\"k\">IC3 2024 losses<\u002Fdiv>\n        <div class=\"v\">$16.6B<\u002Fdiv>\n        <div class=\"d\">Record high across 859,000+ complaints. Ransomware named most pervasive CNI threat by CISA.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"why-cell orange\">\n        <div class=\"k\">Year over year<\u002Fdiv>\n        <div class=\"v\">+33%<\u002Fdiv>\n        <div class=\"d\">Reported IC3 losses 2023 to 2024. Verizon DBIR, IBM CODB and Mandiant trends agree.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"why-cell red\">\n        <div class=\"k\">Sector exposure<\u002Fdiv>\n        <div class=\"v\" style=\"font-family: var(--display); font-style: italic; font-weight: 800; font-size: 1.875rem; letter-spacing: -0.02em;\">Salt Typhoon<\u002Fdiv>\n        <div class=\"d\">State aligned campaign compromised major US telecom networks. Edge devices were primary access points.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>The threat backdrop has changed in <em>concrete, documentable ways<\u002Fem><\u002Fh3>\n\n    <p>Three independent reference points are relevant to the framing of this report. The Verizon Data Breach Investigations Report identifies small and mid sized organizations as the focus of credential based and ransomware driven attacks, with weak external facing configuration cited as a leading initial access pattern across critical infrastructure sectors. The IBM Cost of a Data Breach Report documents sustained year over year growth in average breach cost, with smaller organizations bearing disproportionately high per record cost. The IC3 2024 Internet Crime Report records $16.6 billion in reported losses across more than 859,000 complaints, a record high.<\u002Fp>\n\n    <div class=\"scenario\">\n      <div class=\"lbl\">What changed with Salt Typhoon<\u002Fdiv>\n      <div class=\"title\">Telco is now an explicit, named intelligence target. At scale. By state aligned actors.<\u002Fdiv>\n      <div class=\"body\">\n        <p>The Salt Typhoon campaign, publicly disclosed in late 2024 and the subject of a CISA / FBI / NSA joint advisory in August 2025 (AA25-239A), established a new baseline of attention. The campaign compromised major US telecommunications networks and achieved persistent access for intelligence collection. Public reporting identified edge devices as primary points of initial access, frequently through known unpatched vulnerabilities.<\u002Fp>\n        <p>Previous discussions of telco cyber risk could plausibly be framed as commercial only: ransomware, fraud, IP theft. Salt Typhoon documented intelligence collection grade adversary interest in the sector, using techniques that the same broad class of operators face in the wider ransomware market: unpatched edge devices, weak authentication, DNS misconfiguration.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"pullquote\">\n      The same operational fixes that close exposure to commercial threats also close the fixed cost paths that nation state aligned actors have demonstrably used.\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== 03 · SECTOR STRUCTURE ===== -->\n  <section>\n    <div class=\"section-num\"><b>03<\u002Fb> · Sector structure<\u002Fdiv>\n    <h2>Who actually operates US telecommunications.<\u002Fh2>\n    <p class=\"lede\">Before risk, structure. The shape of the industry determines the operating context in which risk must be understood. Most discussion implicitly assumes a structure that does not match the data.<\u002Fp>\n\n    <h3>The median operator is <em>small, private, and lean<\u002Fem><\u002Fh3>\n\n    <div class=\"why-trio\">\n      <div class=\"why-cell\"><div class=\"k\">Ownership<\u002Fdiv><div class=\"v\">~90%<\u002Fdiv><div class=\"d\">of FCC registry providers are privately held. Public companies represent around 8% of the population.<\u002Fdiv><\u002Fdiv>\n      <div class=\"why-cell\"><div class=\"k\">Revenue<\u002Fdiv><div class=\"v\">51.7%<\u002Fdiv><div class=\"d\">operate below the $10M annual revenue line. Only 5.9% report annual revenue above $1B.<\u002Fdiv><\u002Fdiv>\n      <div class=\"why-cell\"><div class=\"k\">Headcount<\u002Fdiv><div class=\"v\">~69%<\u002Fdiv><div class=\"d\">employ fewer than fifty people. Roughly a third operate with ten or fewer staff.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"margin-top: 1.5rem;\">For the bulk of US telcos, cybersecurity, networking, customer support and billing are typically managed by the same one or two technical staff. Any framework that assumes a security organization will fundamentally misread the median operator.<\u002Fp>\n\n    <h3>Service classification has shifted from legacy wireline to <em>internet voice<\u002Fem><\u002Fh3>\n\n    <div class=\"chart-block\">\n      <div class=\"chart-head\">\n        <div class=\"chart-title\">FCC registry by principal communications type<\u002Fdiv>\n        <div class=\"chart-source\">Source: FCC registry · 2026<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hbar-chart\">\n        <div class=\"hbar-row\"><div class=\"hbar-label\">Interconnected VoIP<\u002Fdiv><div class=\"hbar-track\"><div class=\"hbar-fill ink\" style=\"width: 100%;\"><\u002Fdiv><\u002Fdiv><div class=\"hbar-value\">2,140<\u002Fdiv><\u002Fdiv>\n        <div class=\"hbar-row\"><div class=\"hbar-label\">Incumbent LEC<\u002Fdiv><div class=\"hbar-track\"><div class=\"hbar-fill ink\" style=\"width: 45.8%;\"><\u002Fdiv><\u002Fdiv><div class=\"hbar-value\">981<\u002Fdiv><\u002Fdiv>\n        <div class=\"hbar-row\"><div class=\"hbar-label\">CAP / LEC<\u002Fdiv><div class=\"hbar-track\"><div class=\"hbar-fill ink\" style=\"width: 27.1%;\"><\u002Fdiv><\u002Fdiv><div class=\"hbar-value\">579<\u002Fdiv><\u002Fdiv>\n        <div class=\"hbar-row\"><div class=\"hbar-label\">Private Service Provider<\u002Fdiv><div class=\"hbar-track\"><div class=\"hbar-fill ink\" style=\"width: 14.6%;\"><\u002Fdiv><\u002Fdiv><div class=\"hbar-value\">312<\u002Fdiv><\u002Fdiv>\n        <div class=\"hbar-row\"><div class=\"hbar-label\">Local Reseller<\u002Fdiv><div class=\"hbar-track\"><div class=\"hbar-fill ink\" style=\"width: 12.5%;\"><\u002Fdiv><\u002Fdiv><div class=\"hbar-value\">267<\u002Fdiv><\u002Fdiv>\n        <div class=\"hbar-row\"><div class=\"hbar-label\">Cellular / PCS / SMR<\u002Fdiv><div class=\"hbar-track\"><div class=\"hbar-fill ink\" style=\"width: 9.6%;\"><\u002Fdiv><\u002Fdiv><div class=\"hbar-value\">205<\u002Fdiv><\u002Fdiv>\n        <div class=\"hbar-row\"><div class=\"hbar-label\">Interexchange Carrier<\u002Fdiv><div class=\"hbar-track\"><div class=\"hbar-fill ink\" style=\"width: 4.6%;\"><\u002Fdiv><\u002Fdiv><div class=\"hbar-value\">98<\u002Fdiv><\u002Fdiv>\n        <div class=\"hbar-row\"><div class=\"hbar-label\">Cable TV / LEC<\u002Fdiv><div class=\"hbar-track\"><div class=\"hbar-fill ink\" style=\"width: 3.4%;\"><\u002Fdiv><\u002Fdiv><div class=\"hbar-value\">73<\u002Fdiv><\u002Fdiv>\n        <div class=\"hbar-row\"><div class=\"hbar-label\">Other Local<\u002Fdiv><div class=\"hbar-track\"><div class=\"hbar-fill ink\" style=\"width: 3.4%;\"><\u002Fdiv><\u002Fdiv><div class=\"hbar-value\">72<\u002Fdiv><\u002Fdiv>\n        <div class=\"hbar-row\"><div class=\"hbar-label\">Other Toll<\u002Fdiv><div class=\"hbar-track\"><div class=\"hbar-fill ink\" style=\"width: 2.8%;\"><\u002Fdiv><\u002Fdiv><div class=\"hbar-value\">60<\u002Fdiv><\u002Fdiv>\n        <div class=\"hbar-row\"><div class=\"hbar-label\">Paging &amp; Messaging<\u002Fdiv><div class=\"hbar-track\"><div class=\"hbar-fill ink\" style=\"width: 2.7%;\"><\u002Fdiv><\u002Fdiv><div class=\"hbar-value\">57<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"chart-note\">Interconnected VoIP at 2,140 operators is now the largest single category. Counts above include all 7,000+ telcos in the analysis universe.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>Wireless ISPs outnumber cable operators by 2.6 to 1<\u002Fh3>\n    <p>Among providers with a clear classification, Wireless Internet Service Providers (WISPs) total 1,988, outnumbering cable operators (756) by a factor of approximately 2.6 to 1. WISPs are the dominant rural broadband delivery model in the United States: small, fixed wireless operators serving sparse populations underserved by fibre or cable. Texas alone hosts 207 WISPs; California, 176; Florida, 148.<\u002Fp>\n  <\u002Fsection>\n\n\n  <!-- ===== 04 · GEOGRAPHIC PICTURE ===== -->\n  <section>\n    <div class=\"section-num\"><b>04<\u002Fb> · Geographic picture<\u002Fdiv>\n    <h2>The US telco map: <em>dense in the Plains<\u002Fem>, dominated by VoIP on the coasts.<\u002Fh2>\n    <p class=\"lede\">The geographic distribution of US telco operators tells two stories. The first is sheer count, dominated by large population states. The second is per capita density, which surfaces a strikingly different picture: the rural Plains and Mountain West carry the highest operator concentrations.<\u002Fp>\n\n : 29.9%;\"><\u002Fdiv><\u002Fdiv><div class=\"hbar-value\">132<\u002Fdiv><\u002Fdiv>\n        <div class=\"hbar-row\"><div class=\"hbar-label\">Pennsylvania<\u002Fdiv><div class=\"hbar-track\"><div class=\"hbar-fill orange\" style=\"width: 29.9%;\"><\u002Fdiv><\u002Fdiv><div class=\"hbar-value\">132<\u002Fdiv><\u002Fdiv>\n        <div class=\"hbar-row\"><div class=\"hbar-label\">Minnesota<\u002Fdiv><div class=\"hbar-track\"><div class=\"hbar-fill orange\" style=\"width: 28.5%;\"><\u002Fdiv><\u002Fdiv><div class=\"hbar-value\">126<\u002Fdiv><\u002Fdiv>\n        <div class=\"hbar-row\"><div class=\"hbar-label\">Colorado<\u002Fdiv><div class=\"hbar-track\"><div class=\"hbar-fill orange\" style=\"width: 28.3%;\"><\u002Fdiv><\u002Fdiv><div class=\"hbar-value\">125<\u002Fdiv><\u002Fdiv>\n        <div class=\"hbar-row\"><div class=\"hbar-label\">Virginia<\u002Fdiv><div class=\"hbar-track\"><div class=\"hbar-fill orange\" style=\"width: 27.8%;\"><\u002Fdiv><\u002Fdiv><div class=\"hbar-value\">123<\u002Fdiv><\u002Fdiv>\n        <div class=\"hbar-row\"><div class=\"hbar-label\">Ohio<\u002Fdiv><div class=\"hbar-track\"><div class=\"hbar-fill orange\" style=\"width: 25.8%;\"><\u002Fdiv><\u002Fdiv><div class=\"hbar-value\">114<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"chart-note\">Top fifteen states account for 3,033 telcos, or 43.3% of the 7,000+ universe.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>Iowa is the <em>outlier<\u002Fem>. A legacy wireline anomaly.<\u002Fh3>\n    <p>Iowa hosts 208 telcos: more than New Jersey, more than Michigan, more than Pennsylvania. In a state with 3.2 million residents, this is a per capita telco density approximately six times the national average. The explanation is historical. Iowa, like the broader rural Plains, retains a dense fabric of cooperative and municipal wireline operators dating from the early twentieth century rural electrification and telephone expansion. Where most US states have consolidated, Iowa's regulatory and cooperative framework preserved the original structure.<\u002Fp>\n\n    <h3>Service mix varies dramatically by state<\u002Fh3>\n    <div class=\"chart-block\">\n      <div class=\"chart-head\">\n        <div class=\"chart-title\">Service mix in five anchor states<\u002Fdiv>\n        <div class=\"chart-source\">% of state's principal communications types<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; gap: 1rem;\">\n        <div>\n          <div style=\"font-family: var(--display); font-weight: 700; font-size: 0.875rem; margin-bottom: 0.5rem;\">Texas (442)<\u002Fdiv>\n          <div style=\"display: flex; height: 200px; flex-direction: column-reverse;\">\n            <div style=\"background: #d62524; height: 36.0%; position: relative;\"><span style=\"position: absolute; left: 6px; top: 4px; color: #fff; font-family: var(--mono); font-size: 9px; font-weight: 700;\">VoIP 36%<\u002Fspan><\u002Fdiv>\n            <div style=\"background: #e07a17; height: 22.2%;\"><span style=\"margin-left: 6px; margin-top: 4px; color: #fff; font-family: var(--mono); font-size: 9px; font-weight: 700;\">ILEC 22%<\u002Fspan><\u002Fdiv>\n            <div style=\"background: #c9a227; height: 8.6%;\"><span style=\"margin-left: 6px; color: #fff; font-family: var(--mono); font-size: 9px; font-weight: 700;\">CAP 9%<\u002Fspan><\u002Fdiv>\n            <div style=\"background: #2d7a4a; height: 7.2%;\"><\u002Fdiv>\n            <div style=\"background: #a89b7c; height: 26.0%;\"><span style=\"margin-left: 6px; margin-top: 4px; color: #fff; font-family: var(--mono); font-size: 9px; font-weight: 700;\">Other<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family: var(--display); font-weight: 700; font-size: 0.875rem; margin-bottom: 0.5rem;\">California (367)<\u002Fdiv>\n          <div style=\"display: flex; height: 200px; flex-direction: column-reverse;\">\n            <div style= transform: uppercase; color: var(--static);\">\n        <div style=\"display: flex; align-items: center; gap: 0.4rem;\"><div style=\"width: 14px; height: 12px; background: #d62524;\"><\u002Fdiv>VoIP<\u002Fdiv>\n        <div style=\"display: flex; align-items: center; gap: 0.4rem;\"><div style=\"width: 14px; height: 12px; background: #e07a17;\"><\u002Fdiv>ILEC / Reseller<\u002Fdiv>\n        <div style=\"display: flex; align-items: center; gap: 0.4rem;\"><div style=\"width: 14px; height: 12px; background: #c9a227;\"><\u002Fdiv>CAP / LEC<\u002Fdiv>\n        <div style=\"display: flex; align-items: center; gap: 0.4rem;\"><div style=\"width: 14px; height: 12px; background: #2d7a4a;\"><\u002Fdiv>Cellular<\u002Fdiv>\n        <div style=\"display: flex; align-items: center; gap: 0.4rem;\"><div style=\"width: 14px; height: 12px; background: #a89b7c;\"><\u002Fdiv>Other<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p>The contrast between Iowa and the coastal anchor states is structural. California is 55% VoIP, with just ten ILECs in the entire state. Iowa is 59% ILEC plus 22% CAP/LEC, with only 19 VoIP providers. These two operating models present different risk surfaces: VoIP heavy ecosystems concentrate exposure in cloud and SIP infrastructure; legacy wireline heavy states like Iowa carry the long tail of unmaintained on premises systems.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ===== QUOTE BREAK ===== -->\n  <div class=\"quote-section\">\n    <div class=\"eyebrow muted\">Industry research · 2026<\u002Fdiv>\n    <p class=\"quote\">\n      \"When a critical national infrastructure like telecommunications fails to support its functions <span class=\"em\">securely<\u002Fspan>, everything that is served downstream breaks down with significant disruption.\"\n    <\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ===== PART 2 DIVIDER ===== -->\n  <div class=\"part-divider\">\n    <div class=\"part-num\">Part two<\u002Fdiv>\n    <h2>The <em>findings<\u002Fem>.<\u002Fh2>\n    <p class=\"desc\">What publicly observable data reveals about the cybersecurity posture of US telecommunications operators. Aggregate indicators, severity grading, segmentation patterns.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ===== 05 · THE HEADLINE NUMBER ===== -->\n  <section>\n    <div class=\"section-num\"><b>05<\u002Fb> · The headline number<\u002Fdiv>\n    <h2>Two of every three operators sit in an <em>elevated risk band<\u002Fem>.<\u002Fh2>\n\n    <div class=\"bigfact\">\n      <div class=\"num\">64.8%<\u002Fdiv>\n      <div class=\"statement\">\n        Mean composite score: <strong>65.7 / 100<\u002Fstrong>.<br>\n        Median: <strong>78.5 / 100<\u002Fstrong>.<br>\n        Half the industry sits above the Critical threshold.\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>Risk band distribution across <em>3,106 telcos<\u002Fem><\u002Fh3>\n\n    <div class=\"chart-block\">\n      <div class=\"chart-head\">\n        <div class=\"chart-title\">Distribution by composite risk band<\u002Fdiv>\n        <div class=\"chart-source\">N = 3,106 telcos · Color = severity<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"donut-row\">\n        <div>\n<svg width=\"760\" height=\"760\" viewBox=\"0 0 280 280\" xmlns=\"http://www.w3.org/2000/svg\">\n<path d=\"M 140.00 20.00 A 120 120 0 1 1 92.34 250.13 L 112.20 204.24 A 70 70 0 1 0 140.00 70.00 Z\" fill=\"#d62524\"><\u002Fpath>\n<path d=\"M 92.34 250.13 A 120 120 0 0 1 43.81 211.75 L 83.89 181.85 A 70 70 0 0 0 112.20 204.24 Z\" fill=\"#e07a17\"><\u002Fpath>\n<path d=\"M 43.81 211.75 A 120 120 0 0 1 61.21 49.49 L 94.04 87.20 A 70 70 0 0 0 83.89 181.85 Z\" fill=\"#c9a227\"><\u002Fpath>\n<path d=\"M 61.21 49.49 A 120 120 0 0 1 116.77 22.27 L 126.45 71.32 A 70 70 0 0 0 94.04 87.20 Z\" fill=\"#2d7a4a\"><\u002Fpath>\n<path d=\"M 116.77 22.27 A 120 120 0 0 1 140.75 20.00 L 140.44 70.00 A 70 70 0 0 0 126.45 71.32 Z\" fill=\"#a89b7c\"><\u002Fpath>\n<text x=\"140.0\" y=\"136.0\" text-anchor=\"middle\" font-family=\"Geist, sans-serif\" font-size=\"32\" font-weight=\"800\" fill=\"#d62524\" letter-spacing=\"-1\">64.8%<\u002Ftext>\n<text x=\"140.0\" y=\"158.0\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"9\" font-weight=\"600\" fill=\"#3a3326\" letter-spacing=\"1.2\">ELEVATED BAND<\u002Ftext>\n<\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"donut-legend\">\n          <div class=\"donut-legend-item\"><div class=\"donut-legend-dot red\"><\u002Fdiv><div class=\"donut-legend-band\">Critical<\u002Fdiv><div class=\"donut-legend-pct red\">56.5%<\u002Fdiv><div class=\"donut-legend-n\">1,754<\u002Fdiv><\u002Fdiv>\n          <div class=\"donut-legend-item\"><div class=\"donut-legend-dot orange\"><\u002Fdiv><div class=\"donut-legend-band\">High<\u002Fdiv><div class=\"donut-legend-pct orange\">8.3%<\u002Fdiv><div class=\"donut-legend-n\">257<\u002Fdiv><\u002Fdiv>\n          <div class=\"donut-legend-item\"><div class=\"donut-legend-dot yellow\"><\u002Fdiv><div class=\"donut-legend-band\">Medium<\u002Fdiv><div class=\"donut-legend-pct yellow\">23.8%<\u002Fdiv><div class=\"donut-legend-n\">739<\u002Fdiv><\u002Fdiv>\n          <div class=\"donut-legend-item\"><div class=\"donut-legend-dot green\"><\u002Fdiv><div class=\"donut-legend-band\">Low<\u002Fdiv><div class=\"donut-legend-pct green\">8.3%<\u002Fdiv><div class=\"donut-legend-n\">258<\u002Fdiv><\u002Fdiv>\n          <div class=\"donut-legend-item\"><div class=\"donut-legend-dot grey\"><\u002Fdiv><div class=\"donut-legend-band\">Minimal<\u002Fdiv><div class=\"donut-legend-pct\">3.2%<\u002Fdiv><div class=\"donut-legend-n\">98<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"chart-note\">Critical alone (1,754 telcos at 56.5%) is larger than every other band combined. This is the structural finding that frames everything that follows.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>Score distribution: <em>weighted toward the top<\u002Fem><\u002Fh3>\n    <div class=\"chart-block\">\n      <div class=\"chart-head\">\n        <div class=\"chart-title\">Composite indicator score · histogram<\u002Fdiv>\n        <div class=\"chart-source\">N = 3,106 telcos<\u002Fdiv>\n      <\u002Fdiv>\n<svg width=\"760\" height=\"240\" viewBox=\"0 0 760 240\" xmlns=\"http://www.w3.org/2000/svg\" style=\"font-family: Geist, sans-serif;\">\n<line x1=\"50\" y1=\"210\" x2=\"750\" y2=\"210\" stroke=\"#0a0a0a\" stroke-width=\"1\"><\u002Fline>\n<line x1=\"46\" y1=\"210.0\" x2=\"50\" y2=\"210.0\" stroke=\"#a89b7c\" stroke-width=\"1\"><\u002Fline>\n<text x=\"42\" y=\"213.0\" text-anchor=\"end\" font-family=\"Geist Mono, monospace\" font-size=\"9\" fill=\"#3a3326\">0<\u002Ftext>\n<line x1=\"46\" y1=\"198.4\" x2=\"50\" y2=\"198.4\" stroke=\"#a89b7c\" stroke-width=\"1\"><\u002Fline>\n<text x=\"42\" y=\"201.4\" text-anchor=\"end\" font-family=\"Geist Mono, monospace\" font-size=\"9\" fill=\"#3a3326\">200<\u002Ftext>\n<line x1=\"46\" y1=\"186.8\" x2=\"50\" y2=\"186.8\" stroke=\"#a89b7c\" stroke-width=\"1\"><\u002Fline>\n<text x=\"42\" y=\"189.8\" text-anchor=\"end\" font-family=\"Geist Mono, monospace\" font-size=\"9\" fill=\"#3a3326\">400<\u002Ftext>\n<line x1=\"46\" y1=\"175.2\" x2=\"50\" y2=\"175.2\" stroke=\"#a89b7c\" stroke-width=\"1\"><\u002Fline>\n<text x=\"42\" y=\"178.2\" text-anchor=\"end\" font-family=\"Geist Mono, monospace\" font-size=\"9\" fill=\"#3a3326\">600<\u002Ftext>\n<line x1=\"46\" y1=\"163.6\" x2=\"50\" y2=\"163.6\" stroke=\"#a89b7c\" stroke-width=\"1\"><\u002Fline>\n<text x=\"42\" y=\"166.6\" text-anchor=\"end\" font-family=\"Geist Mono, monospace\" font-size=\"9\" fill=\"#3a3326\">800<\u002Ftext>\n<rect x=\"55.0\" y=\"204.3\" width=\"64.0\" height=\"5.7\" fill=\"#a89b7c\"><\u002Frect>\n<text x=\"87.0\" y=\"200.3\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"10\" font-weight=\"600\" fill=\"#0a0a0a\">98<\u002Ftext>\n<text x=\"87.0\" y=\"225.0\" text-anchor=\"middle\" font-family=\"Geist Mono, monospace\" font-size=\"9\" fill=\"#3a3326\">0–10<\u002Ftext>\n<rect x=\"125.0\"
